<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cube Runner Minimal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #050505;
    color: #E2E8F0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    letter-spacing: -0.01em;
}

body {
    touch-action: none;
}

.game-container {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: #070708;
}

.top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px;
    background: linear-gradient(to bottom, rgba(7,7,8,0.8), rgba(7,7,8,0));
    pointer-events: none;
}

.score-display {
    text-align: right;
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.score-label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(226, 232, 240, 0.35);
    margin-bottom: 2px;
}

.score-value {
    font-size: 32px;
    font-weight: 300;
    line-height: 1;
    color: #FFFFFF;
    transition: transform 0.1s ease;
}

.combo-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #F6AD55;
    margin-top: 4px;
    opacity: 0;
    transform: translateY(-5px);
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.combo-badge.active {
    opacity: 1;
    transform: translateY(0);
}

.timer-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    z-index: 200;
    background: rgba(255, 255, 255, 0.03);
}

.timer-fill {
    height: 100%;
    width: 100%;
    background: rgba(255, 255, 255, 0.8);
    transform-origin: left;
    transition: transform 0.1s linear;
}

.game-area {
    position: relative;
    width: min(100vw, 480px);
    height: min(100vh, 850px);
    border-radius: 32px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.05);
    background: #0A0A0C;
    box-shadow: 0 40px 100px -30px rgba(0,0,0,0.7);
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
    background: #070708;
    touch-action: none;
}

.game-status {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(7, 7, 8, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 500;
}

.game-status.show {
    opacity: 1;
    pointer-events: auto;
}

.game-status h2 {
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
    color: #FFFFFF;
}

.game-status p {
    color: rgba(226, 232, 240, 0.5);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
}

.start-btn {
    padding: 14px 36px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: #070708;
    background: #FFFFFF;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 10px 25px -5px rgba(255,255,255,0.15);
    transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
}

.start-btn:hover {
    background: #E2E8F0;
    box-shadow: 0 15px 30px -5px rgba(255,255,255,0.25);
}

.start-btn:active {
    transform: scale(0.97);
}

@media (max-width: 768px) {
    .score-value {
        font-size: 26px;
    }
    .top-bar {
        padding: 20px;
    }
    .game-area {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
    }
}
</style>
</head>
<body>
<div class="game-container">

    <div class="timer-bar">
        <div class="timer-fill" id="timerFill"></div>
    </div>

    <div class="top-bar">
        <div class="score-display">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
            <div class="combo-badge" id="comboBadge">2X COMBO</div>
        </div>
    </div>

    <div class="game-area">
        <canvas id="gameCanvas"></canvas>

        <!-- START SCREEN -->
        <div class="game-status show" id="startScreen">
            <h2>Cube Runner</h2>
            <p>Target the <span style="color: #4FD1C5; font-weight: 500;">Mint</span> platform.<br>Avoid the <span style="color: #F56565; font-weight: 500;">Coral</span> trap.<br><span style="font-size: 12px; opacity: 0.7; color: #F6AD55;">Jump quickly while the top bar is high to chain Combos!</span></p>
            <button class="start-btn" onclick="gameInstance.startGame()">BEGIN</button>
        </div>

        <!-- GAME OVER / STATUS SCREEN -->
        <div class="game-status" id="gameStatus">
            <h2 id="statusTitle">Game Over</h2>
            <p id="statusMessage">Score: 0</p>
            <button class="start-btn" onclick="gameInstance.startGame()">RETRY</button>
        </div>
    </div>
</div>

<script>
class CubeGame {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        this.colors = {
            bg: '#070708',
            grid: 'rgba(255, 255, 255, 0.02)',
            player: '#FFFFFF',
            playerStroke: '#070708',
            platformBase: '#121214',
            platformBaseStroke: 'rgba(255,255,255,0.06)',
            right: '#4FD1C5', 
            wrong: '#F56565',
            comboText: '#F6AD55'
        };

        this.resize();
        window.addEventListener('resize', () => this.resize());

        this.gameRunning = false;
        this.gamePaused = false;
        this.isJumping = false;

        this.score = 0;
        this.highScore = parseInt(localStorage.getItem('cubeHighScore')) || 0;
        this.comboStreak = 0;

        this.gridCellSize = Math.min(window.innerWidth, window.innerHeight) * 0.32;

        this.currentPlatform = null;
        this.rightPlatform = null;
        this.wrongPlatform = null;

        this.cube = { x: 0, y: 0, rotation: 0, scaleX: 1, scaleY: 1 };
        this.particles = [];
        this.floatingTexts = []; 
        this.screenShake = 0;
        this.time = 0;
        this.platformTimer = 0;
        this.platformDuration = 1.45;

        this.setupInputs();
        this.gameLoop();
    }

    resize() {
        const maxWidth = Math.min(window.innerWidth, 480);
        const maxHeight = Math.min(window.innerHeight, 850);

        this.canvas.width = maxWidth;
        this.canvas.height = maxHeight;

        this.canvas.style.width = `${maxWidth}px`;
        this.canvas.style.height = `${maxHeight}px`;

        this.gridCellSize = Math.min(maxWidth, maxHeight) * 0.28;
    }

    setupInputs() {
        window.addEventListener('keydown', (e) => {
            if (!this.gameRunning || this.gamePaused) return;

            const key = e.key.toLowerCase();
            if (e.key === 'ArrowUp' || key === 'w') this.jump('UP');
            if (e.key === 'ArrowRight' || key === 'd') this.jump('RIGHT');
            if (e.key === 'ArrowDown' || key === 's') this.jump('DOWN');
            if (e.key === 'ArrowLeft' || key === 'a') this.jump('LEFT');
        });

        let touchStartX = 0;
        let touchStartY = 0;

        this.canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });

        this.canvas.addEventListener('touchend', (e) => {
            if (!this.gameRunning || this.gamePaused) return;

            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = touchStartY - e.changedTouches[0].clientY;
            const threshold = 30;

            if (Math.abs(dx) < threshold && Math.abs(dy) < threshold) return;

            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > threshold) this.jump('RIGHT');
                else this.jump('LEFT');
            } else {
                if (dy > threshold) this.jump('UP');
                else this.jump('DOWN');
            }
        }, { passive: true });
    }

    startGame() {
        this.gameRunning = true;
        this.gamePaused = false;
        this.isJumping = false;

        this.score = 0;
        this.comboStreak = 0;
        this.time = 0;
        this.particles = [];
        this.floatingTexts = [];

        const centerX = 0;
        const centerY = 0;

        this.currentPlatform = {
            x: centerX,
            y: centerY,
            width: 56,
            height: 56,
            breaking: false,
            breakProgress: 0
        };

        this.cube.x = centerX;
        this.cube.y = centerY;
        this.cube.rotation = 0;
        this.cube.scaleX = 1;
        this.cube.scaleY = 1;

        this.spawnNext();

        document.getElementById('startScreen').classList.remove('show');
        document.getElementById('gameStatus').classList.remove('show');

        this.updateDisplay();
    }

    spawnNext() {
        const directions = [
            { dir: 'UP', x: 0, y: -this.gridCellSize },
            { dir: 'RIGHT', x: this.gridCellSize, y: 0 },
            { dir: 'DOWN', x: 0, y: this.gridCellSize },
            { dir: 'LEFT', x: -this.gridCellSize, y: 0 }
        ];

        const shuffled = [...directions].sort(() => Math.random() - 0.5);
        
        const rightDir = shuffled[0];
        const wrongDir = shuffled[1];

        const jitter = this.score > 15 ? (Math.random() - 0.5) * 8 : 0;

        this.rightPlatform = {
            dir: rightDir.dir,
            x: this.currentPlatform.x + rightDir.x + jitter,
            y: this.currentPlatform.y + rightDir.y + jitter,
            width: 56,
            height: 56,
            isRight: true
        };

        this.wrongPlatform = {
            dir: wrongDir.dir,
            x: this.currentPlatform.x + wrongDir.x + jitter,
            y: this.currentPlatform.y + wrongDir.y + jitter,
            width: 56,
            height: 56,
            isRight: false
        };

        this.platformTimer = 0;
        this.platformDuration = Math.max(0.45, 1.55 - this.score * 0.022);
    }

    jump(direction) {
        if (!this.gameRunning || this.gamePaused || !this.rightPlatform) return;
        if (this.isJumping) return;

        let targetPlatform = null;

        if (direction === this.rightPlatform.dir) {
            targetPlatform = this.rightPlatform;
        } else if (direction === this.wrongPlatform.dir) {
            targetPlatform = this.wrongPlatform;
        }

        if (!targetPlatform) {
            this.screenShake = 4;
            return;
        }

        // COMBO WINDOW FIX: Evaluates if at least 40% of the bar is remaining when jumped.
        const timerRatioRemaining = 1 - (this.platformTimer / this.platformDuration);
        const isFastJump = timerRatioRemaining >= 0.40;

        this.isJumping = true;
        this.currentPlatform.breaking = true;

        const startX = this.cube.x;
        const startY = this.cube.y;
        const targetX = targetPlatform.x;
        const targetY = targetPlatform.y;

        let progress = 0;
        const duration = 0.12;

        this.cube.scaleX = direction === 'LEFT' || direction === 'RIGHT' ? 1.3 : 0.7;
        this.cube.scaleY = direction === 'LEFT' || direction === 'RIGHT' ? 0.7 : 1.3;

        const animate = () => {
            progress += 0.016 / duration;

            if (progress >= 1) {
                this.cube.x = targetX;
                this.cube.y = targetY;
                this.cube.scaleX = 1;
                this.cube.scaleY = 1;
                this.currentPlatform = targetPlatform;
                
                if (!targetPlatform.isRight) {
                    this.isJumping = false;
                    this.gameOver(false);
                    return;
                }

                this.rightPlatform = null;
                this.wrongPlatform = null;

                if (isFastJump) {
                    this.comboStreak++;
                } else {
                    this.comboStreak = 0;
                }

                const currentMultiplier = this.comboStreak >= 5 ? 3 : (this.comboStreak >= 2 ? 2 : 1);
                this.score += currentMultiplier;

                let labelText = `+${currentMultiplier}`;
                let popupColor = this.colors.right;
                if (currentMultiplier === 2) {
                    labelText = `+2 Double`;
                    popupColor = '#F6E05E'; 
                } else if (currentMultiplier === 3) {
                    labelText = `+3 Streak!`;
                    popupColor = '#F6AD55'; 
                }

                this.triggerFloatingText(this.cube.x, this.cube.y, labelText, popupColor);

                if (isFastJump) {
                    this.createParticles(this.cube.x, this.cube.y, 20, popupColor);
                }

                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('cubeHighScore', this.highScore);
                }

                this.screenShake = currentMultiplier * 4;
                this.createParticles(this.cube.x, this.cube.y, 8, '#FFFFFF');

                const scoreValEl = document.getElementById('scoreValue');
                scoreValEl.style.transform = 'scale(1.15)';
                setTimeout(() => scoreValEl.style.transform = 'scale(1)', 80);

                this.spawnNext();
                this.updateDisplay();

                this.isJumping = false;
                return;
            }

            const t = progress < 0.5
                ? 2 * progress * progress
                : 1 - Math.pow(-2 * progress + 2, 2) / 2;

            const jumpArc = Math.sin(progress * Math.PI) * 35;

            this.cube.x = startX + (targetX - startX) * t;
            this.cube.y = startY + (targetY - startY) * t - jumpArc;
            this.cube.rotation += 0.2;

            requestAnimationFrame(animate);
        };

        animate();
    }

    triggerFloatingText(x, y, text, color) {
        const randomTilt = (Math.random() - 0.5) * 0.4; 
        this.floatingTexts.push({
            x: x,
            y: y - 28, 
            text: text,
            color: color,
            tilt: randomTilt,
            alpha: 1,
            scale: 0.4, 
            life: 1.0   
        });
    }

    createParticles(x, y, count, color = '#FFFFFF') {
        for (let i = 0; i < count; i++) {
            const angle = Math.random() * Math.PI * 2;
            this.particles.push({
                x, y,
                vx: Math.cos(angle) * (1.8 + Math.random() * 3.5),
                vy: Math.sin(angle) * (1.8 + Math.random() * 3.5),
                life: 1,
                size: 1.5 + Math.random() * 2,
                color
            });
        }
    }

    update() {
        if (!this.gameRunning || this.gamePaused) return;

        this.time += 0.016;
        this.platformTimer += 0.022;

        if (this.platformTimer >= this.platformDuration) {
            this.gameOver(true);
            return;
        }

        if (this.currentPlatform && this.currentPlatform.breaking) {
            this.currentPlatform.breakProgress += 0.04;
            if (this.currentPlatform.breakProgress > 1) {
                this.currentPlatform = null;
            }
        }

        this.particles.forEach(p => {
            p.life -= 0.028;
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.95;
            p.vy *= 0.95;
        });
        this.particles = this.particles.filter(p => p.life > 0);

        this.floatingTexts.forEach(t => {
            t.life -= 0.024;
            t.y -= 0.9;      
            if (t.scale < 1) t.scale += 0.15; 
            t.alpha = Math.max(0, t.life);
        });
        this.floatingTexts = this.floatingTexts.filter(t => t.life > 0);

        this.cube.scaleX += (1 - this.cube.scaleX) * 0.2;
        this.cube.scaleY += (1 - this.cube.scaleY) * 0.2;

        if (this.screenShake > 0) {
            this.screenShake *= 0.82;
        }

        this.updateDisplay();
    }

    gameOver(wasTimeout = true) {
        this.gameRunning = false;

        const explosionColor = wasTimeout ? '#FFFFFF' : this.colors.wrong;
        this.createParticles(this.cube.x, this.cube.y, 30, explosionColor);

        document.getElementById('gameStatus').classList.add('show');
        document.getElementById('comboBadge').classList.remove('active');

        if (!wasTimeout) {
            document.getElementById('statusTitle').textContent = 'Trap Triggered';
        } else {
            document.getElementById('statusTitle').textContent = this.score >= this.highScore
                ? 'New Horizon'
                : 'Stalled';
        }

        document.getElementById('statusMessage').textContent =
            `Score ${this.score}  ·  Best ${this.highScore}`;
    }

    updateDisplay() {
        document.getElementById('scoreValue').textContent = this.score;
        const progress = Math.max(0, 1 - this.platformTimer / this.platformDuration);
        document.getElementById('timerFill').style.transform = `scaleX(${progress})`;

        const comboBadge = document.getElementById('comboBadge');
        if (this.comboStreak >= 5) {
            comboBadge.textContent = `3X TRIPLE STREAK`;
            comboBadge.style.color = '#F6AD55';
            comboBadge.classList.add('active');
        } else if (this.comboStreak >= 2) {
            comboBadge.textContent = `2X DOUBLE STREAK`;
            comboBadge.style.color = '#F6E05E';
            comboBadge.classList.add('active');
        } else {
            comboBadge.classList.remove('active');
        }
    }

    worldToScreen(x, y) {
        return {
            x: x - this.cube.x + this.canvas.width / 2,
            y: y - this.cube.y + this.canvas.height / 2
        };
    }

    drawPlatform(p, fillColor, strokeColor, alpha = 1) {
        const ctx = this.ctx;
        const pos = this.worldToScreen(p.x, p.y);
        const r = 4;

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = fillColor;
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1.5;
        
        ctx.beginPath();
        ctx.roundRect(pos.x - 28, pos.y - 28, 56, 56, r);
        ctx.fill();
        ctx.stroke();
        ctx.restore();
    }

    drawGrid() {
        const ctx = this.ctx;
        ctx.strokeStyle = this.colors.grid;
        ctx.lineWidth = 1;
        
        const offsetX = -(this.cube.x % 40);
        const offsetY = -(this.cube.y % 40);

        for (let x = offsetX; x < this.canvas.width; x += 40) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, this.canvas.height);
            ctx.stroke();
        }
        for (let y = offsetY; y < this.canvas.height; y += 40) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(this.canvas.width, y);
            ctx.stroke();
        }
    }

    draw() {
        const ctx = this.ctx;
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        this.drawGrid();

        let shakeX = 0, shakeY = 0;
        if (this.screenShake > 0) {
            shakeX = (Math.random() - 0.5) * this.screenShake;
            shakeY = (Math.random() - 0.5) * this.screenShake;
        }

        ctx.save();
        ctx.translate(shakeX, shakeY);

        if (this.currentPlatform) {
            let currentStroke = this.colors.platformBaseStroke;
            if (this.currentPlatform.isRight === true) currentStroke = this.colors.right;
            if (this.currentPlatform.isRight === false) currentStroke = this.colors.wrong;

            this.drawPlatform(
                this.currentPlatform,
                this.colors.platformBase,
                currentStroke,
                1 - (this.currentPlatform.breakProgress || 0)
            );
        }

        const pulse = Math.sin(this.time * 6) * 0.12 + 0.88;

        if (this.rightPlatform) {
            this.drawPlatform(this.rightPlatform, 'rgba(79, 209, 197, 0.05)', this.colors.right, pulse);
        }
        if (this.wrongPlatform) {
            this.drawPlatform(this.wrongPlatform, 'rgba(245, 101, 101, 0.03)', this.colors.wrong, pulse);
        }

        if (this.rightPlatform && this.wrongPlatform && !this.isJumping) {
            const cubeScreen = this.worldToScreen(this.cube.x, this.cube.y);
            const rightScreen = this.worldToScreen(this.rightPlatform.x, this.rightPlatform.y);
            const wrongScreen = this.worldToScreen(this.wrongPlatform.x, this.wrongPlatform.y);

            ctx.lineWidth = 1;
            ctx.setLineDash([4, 8]);

            ctx.strokeStyle = 'rgba(79, 209, 197, 0.25)';
            ctx.beginPath();
            ctx.moveTo(cubeScreen.x, cubeScreen.y);
            ctx.lineTo(rightScreen.x, rightScreen.y);
            ctx.stroke();

            ctx.strokeStyle = 'rgba(245, 101, 101, 0.15)';
            ctx.beginPath();
            ctx.moveTo(cubeScreen.x, cubeScreen.y);
            ctx.lineTo(wrongScreen.x, wrongScreen.y);
            ctx.stroke();

            ctx.setLineDash([]);
        }

        ctx.save();
        ctx.translate(this.canvas.width / 2, this.canvas.height / 2);
        ctx.rotate(this.cube.rotation);
        ctx.scale(this.cube.scaleX, this.cube.scaleY);

        const size = 15;
        ctx.fillStyle = this.colors.player;
        ctx.strokeStyle = this.colors.playerStroke;
        ctx.lineWidth = 2.5;
        
        ctx.beginPath();
        ctx.roundRect(-size, -size, size * 2, size * 2, 3);
        ctx.fill();
        ctx.stroke();
        ctx.restore();

        this.particles.forEach(p => {
            const pos = this.worldToScreen(p.x, p.y);
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, p.size, 0, Math.PI * 2);
            ctx.fill();
        });

        this.floatingTexts.forEach(t => {
            const pos = this.worldToScreen(t.x, t.y);
            ctx.save();
            ctx.translate(pos.x, pos.y);
            ctx.rotate(t.tilt); 
            ctx.globalAlpha = t.alpha;
            ctx.fillStyle = t.color;
            ctx.font = `700 ${Math.floor(18 * t.scale)}px 'Inter', system-ui, sans-serif`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(t.text, 0, 0);
            ctx.restore();
        });

        ctx.restore();
    }

    gameLoop() {
        const loop = () => {
            this.update();
            this.draw();
            requestAnimationFrame(loop);
        };
        loop();
    }
}

const canvas = document.getElementById('gameCanvas');
const gameInstance = new CubeGame(canvas);
window.gameInstance = gameInstance;
</script>
</body>
</html>
