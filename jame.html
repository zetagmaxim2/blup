<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Portfolio">
    <meta name="theme-color" content="#0a0a0a">
    <title>Portfolio Empire</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ececec;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            color: #ffffff;
        }

        h1 { font-size: 24px; }
        h2 { font-size: 16px; }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: #0a0a0a;
        }

        .header {
            padding: 16px 20px 20px;
            border-bottom: 1px solid #1a1a1a;
            background: #0a0a0a;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 24px;
            height: 24px;
            color: #ff6b35;
            stroke-width: 2;
        }

        .header-title h1 {
            margin: 0;
            font-size: 22px;
        }

        .header-stats {
            display: flex;
            gap: 12px;
            font-size: 12px;
        }

        .stat-item {
            color: #888888;
        }

        .stat-value {
            color: #ff6b35;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .content {
            flex: 1;
            padding: 16px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
        }

        /* ============================================
           METRIC CARDS
           ============================================ */
        .card {
            background: #141414;
            border: 1px solid #242424;
            border-radius: 8px;
            padding: 14px;
            transition: all 0.2s ease;
        }

        .card:active {
            border-color: #404040;
        }

        /* Streak Card */
        .streak-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .streak-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .streak-flame {
            font-size: 32px;
            animation: flame-pulse 2s infinite;
        }

        .streak-info h3 {
            margin: 0 0 2px 0;
            font-size: 14px;
        }

        .streak-days {
            font-size: 12px;
            color: #888888;
        }

        .streak-count {
            font-size: 24px;
            font-weight: 700;
            color: #ff6b35;
            font-family: 'Courier New', monospace;
            min-width: 50px;
            text-align: right;
        }

        .streak-multiplier {
            font-size: 11px;
            color: #ff8a5a;
            margin-top: 4px;
            font-weight: 600;
        }

        /* Rank Card */
        .rank-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-icon {
            font-size: 28px;
        }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            margin: 0;
            font-size: 13px;
            color: #ff6b35;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        .rank-progress-label {
            font-size: 11px;
            color: #666666;
            margin-top: 2px;
        }

        .rank-progress-bar {
            width: 100%;
            height: 4px;
            background: #242424;
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .rank-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b35, #ff8a5a);
            transition: width 0.3s ease;
        }

        /* XP Card */
        .xp-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .xp-left {
            flex: 1;
        }

        .xp-label {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .xp-bar {
            width: 100%;
            height: 6px;
            background: #242424;
            border-radius: 3px;
            overflow: hidden;
        }

        .xp-fill {
            height: 100%;
            background: #ff6b35;
            transition: width 0.3s ease;
        }

        .xp-right {
            text-align: right;
            margin-left: 12px;
        }

        .xp-amount {
            font-size: 14px;
            font-weight: 700;
            color: #ff6b35;
            font-family: 'Courier New', monospace;
        }

        .xp-next {
            font-size: 10px;
            color: #666666;
            margin-top: 2px;
        }

        /* ============================================
           DEPOSIT SECTION
           ============================================ */
        .deposit-card {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1), rgba(255, 107, 53, 0.05));
            border: 1px solid rgba(255, 107, 53, 0.3);
        }

        .deposit-label {
            font-size: 11px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #242424;
            background: #0a0a0a;
            color: #ececec;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="number"]::placeholder {
            color: #666666;
        }

        input[type="number"]:focus {
            border-color: #ff6b35;
            background: #1a1a1a;
        }

        button {
            padding: 12px 18px;
            border-radius: 6px;
            border: none;
            background: #ff6b35;
            color: #0a0a0a;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        button:active {
            background: #e55a24;
            transform: scale(0.96);
        }

        /* ============================================
           PORTFOLIO & STATS
           ============================================ */
        .stats-mini {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
        }

        .stat-box {
            background: rgba(255, 107, 53, 0.08);
            border: 1px solid #242424;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
        }

        .stat-box-label {
            color: #888888;
            font-size: 10px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-box-value {
            color: #ff6b35;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        /* ============================================
           QUESTS
           ============================================ */
        .quests-card {
            background: #141414;
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
        }

        .quests-title {
            font-size: 12px;
            color: #64b4ff;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .quest-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(100, 180, 255, 0.08);
            border-left: 3px solid #64b4ff;
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .quest-item:last-child {
            margin-bottom: 0;
        }

        .quest-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .quest-icon {
            font-size: 16px;
        }

        .quest-name {
            color: #64b4ff;
            font-weight: 600;
        }

        .quest-progress {
            color: #888888;
            font-size: 11px;
        }

        .quest-reward {
            color: #64b4ff;
            font-weight: 600;
            font-size: 11px;
        }

        /* ============================================
           CHALLENGES
           ============================================ */
        .challenges-card {
            background: #141414;
            border: 1px solid #242424;
            border-radius: 8px;
            padding: 12px;
        }

        .challenges-title {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .challenge-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .challenge-item:last-child {
            margin-bottom: 0;
        }

        .challenge-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .challenge-checkbox {
            width: 16px;
            height: 16px;
            border: 1px solid #666666;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }

        .challenge-name {
            color: #ececec;
        }

        .challenge-progress {
            color: #666666;
            font-size: 11px;
        }

        /* ============================================
           NOTIFICATION / BONUS
           ============================================ */
        .bonus-notification {
            background: linear-gradient(135deg, #ff6b35, #ff8a5a);
            color: #0a0a0a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 700;
            text-align: center;
            font-size: 13px;
        }

        .bonus-emoji {
            font-size: 18px;
            margin-right: 6px;
        }

        /* ============================================
           UNLOCK SECTION
           ============================================ */
        .unlocks-card {
            background: #141414;
            border: 1px solid #242424;
            border-radius: 8px;
            padding: 12px;
        }

        .unlocks-title {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .unlocks-count {
            color: #ff6b35;
            font-weight: 700;
            font-size: 11px;
        }

        .unlocks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
        }

        .unlock-badge {
            background: rgba(100, 100, 100, 0.2);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            color: #555555;
            opacity: 0.6;
            cursor: help;
        }

        .unlock-badge.earned {
            background: rgba(255, 107, 53, 0.3);
            border-color: #ff6b35;
            color: #ff6b35;
            font-weight: 700;
            opacity: 1;
        }

        .unlock-emoji {
            display: block;
            font-size: 18px;
            margin-bottom: 2px;
        }

        .unlock-badge.hidden .unlock-emoji {
            filter: blur(2px);
            opacity: 0.5;
        }

        .unlock-badge.hidden {
            position: relative;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes flame-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes xpPop {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }

        .xp-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translateX(-50%) translateY(-50%);
            color: #ff6b35;
            font-weight: 700;
            font-size: 32px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            animation: xpPop 0.8s ease-out forwards;
            z-index: 200;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .content {
                padding: 12px;
                gap: 10px;
            }

            .card {
                padding: 12px;
            }

            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="header-content">
            <div class="header-left">
                <svg class="header-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13 7H6v10m0 0v4m0-4l9-9m0 0h-7" />
                </svg>
                <h1>Portfolio</h1>
            </div>
            <div class="header-stats">
                <div class="stat-item">Level <span class="stat-value" id="headerLevel">1</span></div>
            </div>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="container">
        <div class="content">

            <!-- Bonus Notification -->
            <div class="bonus-notification hidden" id="bonusNotification">
                <span class="bonus-emoji" id="bonusEmoji">✨</span>
                <span id="bonusText">Lucky Deposit! +50% XP</span>
            </div>

            <!-- Streak Card -->
            <div class="card streak-card">
                <div class="streak-left">
                    <div class="streak-flame" id="streakFlame">🔥</div>
                    <div class="streak-info">
                        <h3>Day Streak</h3>
                        <div class="streak-days">Keep depositing daily</div>
                        <div class="streak-multiplier" id="streakMultiplier"></div>
                    </div>
                </div>
                <div class="streak-count" id="streakCount">0</div>
            </div>

            <!-- Rank & XP -->
            <div class="card rank-card">
                <div class="rank-icon" id="rankEmoji">🎖️</div>
                <div class="rank-info">
                    <div class="rank-name" id="rankName">Rookie</div>
                    <div class="rank-progress-label" id="rankLabel">0 / 1500 XP</div>
                    <div class="rank-progress-bar">
                        <div class="rank-progress-fill" id="rankProgressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Deposit -->
            <div class="card deposit-card">
                <label class="deposit-label">Today's Deposit</label>
                <div class="input-group">
                    <input type="number" id="depositInput" placeholder="0.00" step="0.01" min="0">
                    <button onclick="handleDeposit()">Deposit</button>
                </div>
            </div>

            <!-- Stats Mini -->
            <div class="stats-mini">
                <div class="stat-box">
                    <div class="stat-box-label">Portfolio</div>
                    <div class="stat-box-value" id="portfolioValue">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-box-label">Total XP</div>
                    <div class="stat-box-value" id="totalXP">0</div>
                </div>
            </div>

            <!-- Active Quests -->
            <div class="quests-card">
                <div class="quests-title">🎯 Active Quests</div>
                <div id="questsList"></div>
            </div>

            <!-- Challenges -->
            <div class="challenges-card">
                <div class="challenges-title">Weekly Challenges</div>
                <div id="challengesList"></div>
            </div>

            <!-- Unlocks -->
            <div class="unlocks-card">
                <div class="unlocks-title">
                    Achievements
                    <span class="unlocks-count" id="unlocksCount">0/15</span>
                </div>
                <div class="unlocks-grid" id="unlocksGrid"></div>
            </div>

        </div>
    </div>

    <script>
        // ============================================
        // GAME STATE
        // ============================================
        const RANKS = [
            { name: "Rookie", xpRequired: 0, emoji: "🎖️", perks: "Basic tracking" },
            { name: "Trader", xpRequired: 1500, emoji: "📈", perks: "+5% XP bonus" },
            { name: "Analyst", xpRequired: 3500, emoji: "📊", perks: "New asset class" },
            { name: "Strategist", xpRequired: 6500, emoji: "🧠", perks: "Doubled streak" },
            { name: "Tycoon", xpRequired: 11000, emoji: "💼", perks: "Weekend boost" },
            { name: "Magnate", xpRequired: 17000, emoji: "👑", perks: "Hall of Fame" },
            { name: "Legend", xpRequired: 25000, emoji: "⭐", perks: "Exclusive rewards" }
        ];

        const INITIAL_QUESTS = [
            { id: 1, name: "First Steps", icon: "👣", desc: "Make your first deposit", xp: 100, type: "deposit_count", target: 1 },
            { id: 2, name: "Double Down", icon: "🎯", desc: "Deposit 2 times", xp: 150, type: "deposit_count", target: 2 },
            { id: 3, name: "Weekly Warrior", icon: "🗓️", desc: "Deposit on 3 different days", xp: 200, type: "deposit_days", target: 3 },
        ];

        const QUEST_POOL = [
            { name: "Big Spender", icon: "💸", desc: "Deposit $50 or more", xp: 250, type: "deposit_amount", target: 50 },
            { name: "Humble Grind", icon: "⚙️", desc: "Make 5 deposits", xp: 300, type: "deposit_count", target: 5 },
            { name: "Dedication", icon: "🎖️", desc: "Maintain a 5-day streak", xp: 350, type: "streak", target: 5 },
            { name: "Unstoppable", icon: "🚀", desc: "Reach a 10-day streak", xp: 500, type: "streak", target: 10 },
            { name: "Portfolio Growth", icon: "📈", desc: "Reach $500 portfolio", xp: 400, type: "portfolio", target: 500 },
            { name: "High Roller", icon: "🎰", desc: "Reach $1000 portfolio", xp: 600, type: "portfolio", target: 1000 },
            { name: "Daily Ritual", icon: "☀️", desc: "Deposit for 7 consecutive days", xp: 550, type: "streak", target: 7 },
            { name: "Fortune Finder", icon: "🍀", desc: "Get a lucky bonus 3 times", xp: 300, type: "bonus_count", target: 3 },
        ];

        const ACHIEVEMENTS = [
            { id: 1, name: "First Deposit", emoji: "🚀", xp: 0, desc: "Make your first deposit", hidden: false },
            { id: 2, name: "7-Day Streak", emoji: "🔥", xp: 500, desc: "7 consecutive days", hidden: false },
            { id: 3, name: "Level 2", emoji: "📈", xp: 1500, desc: "Reach Trader rank", hidden: false },
            { id: 4, name: "$1K Portfolio", emoji: "💰", xp: 1000, desc: "Portfolio reaches $1K", hidden: false },
            { id: 5, name: "14-Day Streak", emoji: "🌟", xp: 2000, desc: "14 consecutive days", hidden: false },
            { id: 6, name: "Level 3", emoji: "📊", xp: 3500, desc: "Reach Analyst rank", hidden: false },
            { id: 7, name: "All-Star", emoji: "⭐", xp: 3000, desc: "Complete 10 quests", hidden: true },
            { id: 8, name: "Jackpot!", emoji: "💎", xp: 5000, desc: "Get jackpot bonus 5 times", hidden: true },
            { id: 9, name: "Month Master", emoji: "👑", xp: 4000, desc: "28-day streak achievement", hidden: true },
            { id: 10, name: "XP Millionaire", emoji: "🏆", xp: 10000, desc: "Reach 25K XP total", hidden: true },
            { id: 11, name: "Big Depositor", emoji: "💵", xp: 3500, desc: "Single deposit of $100+", hidden: true },
            { id: 12, name: "Perfect Week", emoji: "💯", xp: 2500, desc: "Deposit all 7 days of week", hidden: true },
            { id: 13, name: "Quest Master", emoji: "🎯", xp: 6000, desc: "Complete 25 quests", hidden: true },
            { id: 14, name: "Legendary Streak", emoji: "⚡", xp: 8000, desc: "60-day streak", hidden: true },
            { id: 15, name: "Ultimate Tycoon", emoji: "🏛️", xp: 12000, desc: "Reach Magnate rank", hidden: true },
        ];

        const CHALLENGES = [
            { id: 1, name: "Three Peat", desc: "Deposit 3 days in a row", xp: 200, max: 3 },
            { id: 2, name: "Consistency", desc: "Deposit 5 weekdays", xp: 300, max: 5 },
            { id: 3, name: "Big Money", desc: "Deposit above weekly avg", xp: 150, max: 1 }
        ];

        let gameState = {
            totalXP: 0,
            streak: 0,
            portfolio: 0,
            lastDepositDate: null,
            deposits: [],
            unlockedAchievements: [],
            completedQuests: [],
            activeQuests: [],
            depositCount: 0,
            weeklyDepositDays: [],
            weeklyTotal: 0,
            challengesCompleted: {},
            bonusCount: 0,
            maxSingleDeposit: 0,
            currentWeek: 0
        };

        // ============================================
        // LOAD & SAVE
        // ============================================
        function loadGame() {
            const saved = localStorage.getItem('portfolioGame');
            if (saved) {
                gameState = JSON.parse(saved);
                checkStreakContinuation();
                checkWeeklyReset();
                initializeActiveQuests();
            } else {
                initializeActiveQuests();
            }
        }

        function saveGame() {
            localStorage.setItem('portfolioGame', JSON.stringify(gameState));
        }

        function checkStreakContinuation() {
            const today = new Date().toDateString();
            const lastDate = gameState.lastDepositDate;
            const yesterday = new Date(Date.now() - 86400000).toDateString();

            if (lastDate !== today && lastDate !== yesterday) {
                gameState.streak = 0;
            }
        }

        function checkWeeklyReset() {
            const today = new Date();
            const currentWeek = Math.floor((Date.now()) / (7 * 86400000));
            const savedWeek = gameState.currentWeek || 0;

            if (currentWeek !== savedWeek) {
                gameState.weeklyDepositDays = [];
                gameState.weeklyTotal = 0;
                gameState.currentWeek = currentWeek;
                gameState.challengesCompleted = {};
            }
        }

        function initializeActiveQuests() {
            if (gameState.activeQuests.length === 0) {
                gameState.activeQuests = INITIAL_QUESTS.slice(0, 3);
            }
        }

        function getStreakMultiplier() {
            if (gameState.streak >= 28) return 4;
            if (gameState.streak >= 14) return 3;
            if (gameState.streak >= 7) return 2;
            if (gameState.streak >= 3) return 1.5;
            return 1;
        }

        // ============================================
        // QUEST SYSTEM
        // ============================================
        function checkQuestProgress() {
            gameState.activeQuests.forEach(quest => {
                let progress = 0;
                
                if (quest.type === 'deposit_count') {
                    progress = gameState.depositCount;
                } else if (quest.type === 'deposit_days') {
                    progress = gameState.weeklyDepositDays.length;
                } else if (quest.type === 'deposit_amount') {
                    progress = gameState.maxSingleDeposit;
                } else if (quest.type === 'streak') {
                    progress = gameState.streak;
                } else if (quest.type === 'portfolio') {
                    progress = gameState.portfolio;
                } else if (quest.type === 'bonus_count') {
                    progress = gameState.bonusCount;
                }

                if (progress >= quest.target && !gameState.completedQuests.includes(quest.id)) {
                    completeQuest(quest);
                }
            });
        }

        function completeQuest(quest) {
            gameState.completedQuests.push(quest.id);
            gameState.totalXP += quest.xp;
            showBonus(`✅ Quest Complete: ${quest.name}! +${quest.xp} XP`, "🎯");
            unlockNewQuest();
            render();
        }

        function unlockNewQuest() {
            const availableQuests = QUEST_POOL.filter(q => 
                !gameState.activeQuests.some(aq => aq.name === q.name) &&
                !gameState.completedQuests.some(cq => 
                    QUEST_POOL.find(p => p.name === q.name && p.id === cq)
                )
            );

            if (availableQuests.length > 0 && gameState.activeQuests.length < 3) {
                const randomQuest = availableQuests[Math.floor(Math.random() * availableQuests.length)];
                const questWithId = { 
                    ...randomQuest, 
                    id: Math.random() 
                };
                gameState.activeQuests.push(questWithId);
            }
        }

        // ============================================
        // DEPOSITS & XP
        // ============================================
        function handleDeposit() {
            const input = document.getElementById('depositInput');
            const amount = parseFloat(input.value);

            if (!amount || amount <= 0) {
                alert('Enter a valid amount');
                return;
            }

            const today = new Date().toDateString();
            const isNewDay = gameState.lastDepositDate !== today;

            if (isNewDay) {
                gameState.streak++;
                gameState.lastDepositDate = today;
                gameState.weeklyDepositDays.push(today);
                gameState.weeklyTotal += amount;
            } else {
                gameState.weeklyTotal += amount;
            }

            gameState.portfolio += amount;
            gameState.depositCount++;
            gameState.maxSingleDeposit = Math.max(gameState.maxSingleDeposit, amount);
            gameState.deposits.push({ date: today, amount });

            // Calculate XP with streak multiplier
            const multiplier = getStreakMultiplier();
            let baseXP = 100;
            let xpGained = Math.floor(baseXP * multiplier);
            let bonusText = "Base deposit";
            let bonusEmoji = "✓";

            // Random bonus (70% base, 20% lucky, 7% jackpot, 3% legendary)
            const rand = Math.random() * 100;
            if (rand < 3) {
                xpGained = Math.floor(300 * multiplier); // 200% bonus
                bonusText = "🏆 Legendary! +200% XP";
                bonusEmoji = "🏆";
                gameState.bonusCount++;
                showBonus(bonusText, bonusEmoji);
            } else if (rand < 10) {
                xpGained = Math.floor(200 * multiplier); // 100% bonus
                bonusText = "💎 Jackpot! +100% XP";
                bonusEmoji = "💎";
                gameState.bonusCount++;
                showBonus(bonusText, bonusEmoji);
            } else if (rand < 30) {
                xpGained = Math.floor(150 * multiplier); // 50% bonus
                bonusText = "🌟 Lucky! +50% XP";
                bonusEmoji = "🌟";
                gameState.bonusCount++;
                showBonus(bonusText, bonusEmoji);
            }

            // Streak bonuses
            if (gameState.streak === 7) {
                xpGained += Math.floor(500 * multiplier);
                showBonus("🔥 7-Day Streak! +" + Math.floor(500 * multiplier) + " XP", "🔥");
            } else if (gameState.streak === 14) {
                xpGained += Math.floor(1000 * multiplier);
                showBonus("🔥 14-Day Streak! +" + Math.floor(1000 * multiplier) + " XP", "🔥");
            } else if (gameState.streak === 28) {
                xpGained += Math.floor(2000 * multiplier);
                showBonus("👑 Perfect Month! +" + Math.floor(2000 * multiplier) + " XP", "👑");
            }

            gameState.totalXP += xpGained;

            // Update achievements, quests, and challenges
            checkAchievements();
            checkQuestProgress();
            updateChallenges();

            // Visual feedback
            showXPPopup(xpGained);
            input.value = '';
            render();
            saveGame();
        }

        function showBonus(text, emoji) {
            const el = document.getElementById('bonusNotification');
            document.getElementById('bonusText').textContent = text;
            document.getElementById('bonusEmoji').textContent = emoji;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function showXPPopup(amount) {
            const popup = document.createElement('div');
            popup.className = 'xp-popup';
            popup.textContent = '+' + amount + ' XP';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 800);
        }

        // ============================================
        // CHALLENGES
        // ============================================
        function updateChallenges() {
            // Three Peat - 3 consecutive days
            if (gameState.streak >= 3 && !gameState.challengesCompleted[1]) {
                gameState.challengesCompleted[1] = true;
            }

            // Consistency - 5 weekdays
            const weekdayCount = gameState.weeklyDepositDays.filter(dateStr => {
                const day = new Date(dateStr).getDay();
                return day !== 0 && day !== 6;
            }).length;
            if (weekdayCount >= 5 && !gameState.challengesCompleted[2]) {
                gameState.challengesCompleted[2] = true;
            }

            // Big Money - deposit above weekly average
            const avgDeposit = gameState.weeklyTotal / Math.max(gameState.weeklyDepositDays.length, 1);
            if (gameState.deposits.length > 0) {
                const lastDeposit = gameState.deposits[gameState.deposits.length - 1].amount;
                if (lastDeposit > avgDeposit && !gameState.challengesCompleted[3]) {
                    gameState.challengesCompleted[3] = true;
                }
            }
        }

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        function checkAchievements() {
            // First Deposit
            if (gameState.depositCount === 1 && !gameState.unlockedAchievements.includes(1)) {
                gameState.unlockedAchievements.push(1);
                showBonus("🎉 First Deposit unlocked!", "🚀");
            }

            // 7-Day Streak
            if (gameState.streak === 7 && !gameState.unlockedAchievements.includes(2)) {
                gameState.unlockedAchievements.push(2);
                showBonus("🔥 7-Day Streak unlocked!", "🔥");
            }

            // Level 2 (Trader)
            if (gameState.totalXP >= 1500 && !gameState.unlockedAchievements.includes(3)) {
                gameState.unlockedAchievements.push(3);
                showBonus("📈 Reached Trader level!", "📈");
            }

            // $1K Portfolio
            if (gameState.portfolio >= 1000 && !gameState.unlockedAchievements.includes(4)) {
                gameState.unlockedAchievements.push(4);
                showBonus("💰 $1K Portfolio!", "💰");
            }

            // 14-Day Streak
            if (gameState.streak === 14 && !gameState.unlockedAchievements.includes(5)) {
                gameState.unlockedAchievements.push(5);
                showBonus("🌟 14-Day Streak unlocked!", "🌟");
            }

            // Level 3 (Analyst)
            if (gameState.totalXP >= 3500 && !gameState.unlockedAchievements.includes(6)) {
                gameState.unlockedAchievements.push(6);
                showBonus("📊 Reached Analyst level!", "📊");
            }

            // All-Star (10 quests)
            if (gameState.completedQuests.length >= 10 && !gameState.unlockedAchievements.includes(7)) {
                gameState.unlockedAchievements.push(7);
                showBonus("⭐ All-Star - 10 Quests Complete!", "⭐");
            }

            // Jackpot (5 jackpot bonuses)
            if (gameState.bonusCount >= 5 && !gameState.unlockedAchievements.includes(8)) {
                gameState.unlockedAchievements.push(8);
                showBonus("💎 Jackpot! 5 bonus hits!", "💎");
            }

            // Month Master (28-day streak)
            if (gameState.streak === 28 && !gameState.unlockedAchievements.includes(9)) {
                gameState.unlockedAchievements.push(9);
                showBonus("👑 Perfect Month!", "👑");
            }

            // XP Millionaire (25K XP)
            if (gameState.totalXP >= 25000 && !gameState.unlockedAchievements.includes(10)) {
                gameState.unlockedAchievements.push(10);
                showBonus("🏆 XP Millionaire - 25K XP!", "🏆");
            }

            // Big Depositor (100+ single deposit)
            if (gameState.maxSingleDeposit >= 100 && !gameState.unlockedAchievements.includes(11)) {
                gameState.unlockedAchievements.push(11);
                showBonus("💵 Big Depositor - $100+!", "💵");
            }

            // Perfect Week (all 7 days)
            const uniqueDays = new Set(gameState.weeklyDepositDays.map(d => new Date(d).getDay()));
            if (uniqueDays.size === 7 && !gameState.unlockedAchievements.includes(12)) {
                gameState.unlockedAchievements.push(12);
                showBonus("💯 Perfect Week - All 7 Days!", "💯");
            }

            // Quest Master (25 quests)
            if (gameState.completedQuests.length >= 25 && !gameState.unlockedAchievements.includes(13)) {
                gameState.unlockedAchievements.push(13);
                showBonus("🎯 Quest Master - 25 Quests!", "🎯");
            }

            // Legendary Streak (60 days)
            if (gameState.streak === 60 && !gameState.unlockedAchievements.includes(14)) {
                gameState.unlockedAchievements.push(14);
                showBonus("⚡ Legendary Streak - 60 Days!", "⚡");
            }

            // Ultimate Tycoon (Magnate rank - 17000 XP)
            if (gameState.totalXP >= 17000 && !gameState.unlockedAchievements.includes(15)) {
                gameState.unlockedAchievements.push(15);
                showBonus("🏛️ Ultimate Tycoon - Magnate!", "🏛️");
            }
        }

        // ============================================
        // RENDERING
        // ============================================
        function getCurrentRank() {
            for (let i = RANKS.length - 1; i >= 0; i--) {
                if (gameState.totalXP >= RANKS[i].xpRequired) {
                    return { index: i, rank: RANKS[i] };
                }
            }
            return { index: 0, rank: RANKS[0] };
        }

        function render() {
            const current = getCurrentRank();
            const nextRank = RANKS[current.index + 1];

            // Header
            document.getElementById('headerLevel').textContent = current.index + 1;

            // Streak
            document.getElementById('streakCount').textContent = gameState.streak;
            const multiplier = getStreakMultiplier();
            document.getElementById('streakMultiplier').textContent = 
                multiplier > 1 ? `${multiplier}x XP Multiplier` : '';
            
            if (gameState.streak === 0) {
                document.getElementById('streakFlame').style.display = 'none';
            } else {
                document.getElementById('streakFlame').style.display = 'block';
            }

            // Rank
            document.getElementById('rankEmoji').textContent = current.rank.emoji;
            document.getElementById('rankName').textContent = current.rank.name;

            if (nextRank) {
                const xpToNext = nextRank.xpRequired - gameState.totalXP;
                document.getElementById('rankLabel').textContent = 
                    gameState.totalXP + ' / ' + nextRank.xpRequired + ' XP';
                const progress = (gameState.totalXP - current.rank.xpRequired) / 
                    (nextRank.xpRequired - current.rank.xpRequired) * 100;
                document.getElementById('rankProgressFill').style.width = Math.min(progress, 100) + '%';
            } else {
                document.getElementById('rankLabel').textContent = 'MAX RANK';
                document.getElementById('rankProgressFill').style.width = '100%';
            }

            // Portfolio & XP
            document.getElementById('portfolioValue').textContent = '$' + gameState.portfolio.toFixed(2);
            document.getElementById('totalXP').textContent = gameState.totalXP;

            // Quests
            renderQuests();

            // Challenges
            renderChallenges();

            // Unlocks
            renderUnlocks();
        }

        function renderQuests() {
            const list = document.getElementById('questsList');
            list.innerHTML = gameState.activeQuests.map(quest => {
                let progress = 0;
                let maxProgress = quest.target;
                
                if (quest.type === 'deposit_count') {
                    progress = gameState.depositCount;
                } else if (quest.type === 'deposit_days') {
                    progress = gameState.weeklyDepositDays.length;
                } else if (quest.type === 'deposit_amount') {
                    progress = Math.floor(gameState.maxSingleDeposit);
                } else if (quest.type === 'streak') {
                    progress = gameState.streak;
                } else if (quest.type === 'portfolio') {
                    progress = Math.floor(gameState.portfolio);
                } else if (quest.type === 'bonus_count') {
                    progress = gameState.bonusCount;
                }

                const completed = progress >= maxProgress;
                
                return `
                    <div class="quest-item">
                        <div class="quest-left">
                            <div class="quest-icon">${quest.icon}</div>
                            <div>
                                <div class="quest-name">${quest.name}</div>
                                <div class="quest-progress">${quest.desc}</div>
                            </div>
                        </div>
                        <div class="quest-reward">${progress}/${maxProgress}</div>
                    </div>
                `;
            }).join('');
        }

        function renderChallenges() {
            const list = document.getElementById('challengesList');
            list.innerHTML = CHALLENGES.map(ch => {
                const completed = gameState.challengesCompleted[ch.id] || false;
                return `
                    <div class="challenge-item">
                        <div class="challenge-left">
                            <div class="challenge-checkbox" style="border-color: ${completed ? '#ff6b35' : '#666666'}; background: ${completed ? '#ff6b35' : 'transparent'}; color: white;">
                                ${completed ? '✓' : ''}
                            </div>
                            <div>
                                <div class="challenge-name">${ch.name}</div>
                                <div class="challenge-progress">${ch.desc} · +${ch.xp} XP</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUnlocks() {
            const grid = document.getElementById('unlocksGrid');
            const unlockedCount = gameState.unlockedAchievements.length;
            document.getElementById('unlocksCount').textContent = `${unlockedCount}/15`;
            
            grid.innerHTML = ACHIEVEMENTS.map(unlock => {
                const earned = gameState.unlockedAchievements.includes(unlock.id);
                const isHidden = unlock.hidden && !earned;
                
                return `
                    <div class="unlock-badge ${earned ? 'earned' : ''} ${isHidden ? 'hidden' : ''}" title="${isHidden ? '?' : unlock.desc}">
                        <span class="unlock-emoji">${isHidden ? '❓' : unlock.emoji}</span>
                        <div style="font-size: 9px;">${isHidden ? 'Secret' : unlock.name}</div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // INIT
        // ============================================
        document.getElementById('depositInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleDeposit();
        });

        window.addEventListener('load', () => {
            loadGame();
            render();
        });
    </script>
</body>
</html>
