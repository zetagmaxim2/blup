<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Curator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .container {
            width: 100%;
            max-width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            position: relative;
        }

        .header {
            padding: 20px;
            text-align: center;
            z-index: 10;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .upload-section {
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .upload-label {
            display: inline-block;
            padding: 16px 32px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            color: white;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .upload-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .upload-label:active {
            transform: translateY(0);
        }

        #photoInput {
            display: none;
        }

        .swipe-container {
            position: relative;
            width: 100%;
            max-width: 320px;
            height: 500px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .swipe-container.active {
            display: flex;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            cursor: grab;
            user-select: none;
            touch-action: none;
            transition: transform 0.1s ease-out, opacity 0.1s ease-out;
        }

        .card.dragging {
            transition: none;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .card:hover .card-overlay {
            opacity: 1;
        }

        .swipe-hint {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            justify-content: center;
            opacity: 0;
            animation: slideUp 0.6s ease-out 0.3s forwards;
        }

        .hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .hint-icon {
            font-size: 24px;
            opacity: 0.7;
        }

        .hint.delete .hint-icon {
            animation: swipeLeft 2s ease-in-out infinite;
        }

        .hint.keep .hint-icon {
            animation: swipeRight 2s ease-in-out infinite;
        }

        .progress {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
        }

        .progress-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b 0%, #ff8787 100%);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .summary-section {
            display: none;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .summary-section.active {
            display: block;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
            max-width: 300px;
        }

        .stat {
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .delete-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 107, 107, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .keep-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes swipeLeft {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-8px); }
        }

        @keyframes swipeRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @media (max-height: 600px) {
            .swipe-container {
                height: 400px;
            }

            .header {
                padding: 12px;
            }

            .header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Photo Curator</h1>
            <p>Swipe left to delete, right to keep</p>
        </div>

        <div class="content">
            <!-- Upload Section -->
            <div class="upload-section" id="uploadSection">
                <label class="upload-label">
                    📷 Select Photos
                    <input type="file" id="photoInput" accept="image/*" multiple>
                </label>
            </div>

            <!-- Swipe Section -->
            <div class="swipe-container" id="swipeContainer">
                <div class="card" id="card">
                    <img id="cardImage" src="" alt="Photo">
                    <div class="keep-badge">✓ Keep</div>
                    <div class="delete-badge">✕ Delete</div>
                    <div class="card-overlay">
                        <span>Swipe for action</span>
                    </div>
                </div>
                <div class="swipe-hint">
                    <div class="hint delete">
                        <div class="hint-icon">👈</div>
                        <div>Delete</div>
                    </div>
                    <div class="hint keep">
                        <div class="hint-icon">👉</div>
                        <div>Keep</div>
                    </div>
                </div>

                <div class="progress">
                    <div class="progress-text" id="progressText">0 / 0</div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <!-- Summary Section -->
            <div class="summary-section" id="summarySection">
                <h2 style="font-size: 24px; margin-bottom: 10px;">All Done! 🎉</h2>
                <p style="color: rgba(255, 255, 255, 0.6); margin-bottom: 20px;">Here's your curation summary</p>
                
                <div class="summary-stats">
                    <div class="stat">
                        <div class="stat-number" id="totalPhotos">0</div>
                        <div class="stat-label">Total Photos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="deleteCount">0</div>
                        <div class="stat-label">To Delete</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="keepCount">0</div>
                        <div class="stat-label">To Keep</div>
                    </div>
                    <div class="stat">
                        <div class="stat-number" id="percentKeep">0%</div>
                        <div class="stat-label">Keep Rate</div>
                    </div>
                </div>

                <p style="color: rgba(255, 255, 255, 0.6); margin-top: 20px; font-size: 13px;">
                    Photos marked for deletion are flagged but not permanently deleted from your device.
                </p>

                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetApp()">Start Over</button>
                    <button class="btn btn-primary" onclick="exportResults()">Export List</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let photos = [];
        let currentIndex = 0;
        let decisions = {}; // { index: 'keep' or 'delete' }
        let touchStartX = 0;
        let touchStartY = 0;
        let isDragging = false;

        const photoInput = document.getElementById('photoInput');
        const uploadSection = document.getElementById('uploadSection');
        const swipeContainer = document.getElementById('swipeContainer');
        const summarySection = document.getElementById('summarySection');
        const card = document.getElementById('card');
        const cardImage = document.getElementById('cardImage');
        const progressText = document.getElementById('progressText');
        const progressFill = document.getElementById('progressFill');

        // Handle photo selection
        photoInput.addEventListener('change', (e) => {
            photos = Array.from(e.target.files).map(file => URL.createObjectURL(file));
            decisions = {};
            currentIndex = 0;

            if (photos.length > 0) {
                uploadSection.style.display = 'none';
                summarySection.classList.remove('active');
                swipeContainer.classList.add('active');
                showPhoto();
            }
        });

        function showPhoto() {
            if (currentIndex >= photos.length) {
                showSummary();
                return;
            }

            cardImage.src = photos[currentIndex];
            updateProgress();
            resetCard();
        }

        function resetCard() {
            card.style.transform = 'translateX(0) rotateZ(0deg)';
            card.classList.remove('dragging');
            document.querySelector('.keep-badge').style.opacity = '0';
            document.querySelector('.delete-badge').style.opacity = '0';
        }

        // Touch events
        card.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            isDragging = true;
            card.classList.add('dragging');
        }, { passive: true });

        card.addEventListener('touchmove', (e) => {
            if (!isDragging) return;

            const touchX = e.touches[0].clientX;
            const touchY = e.touches[0].clientY;
            const diffX = touchX - touchStartX;
            const diffY = touchY - touchStartY;

            // Only allow horizontal swipe
            if (Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
                
                const rotate = (diffX / window.innerWidth) * 20;
                card.style.transform = `translateX(${diffX}px) rotateZ(${rotate}deg)`;

                // Show badges based on direction
                if (diffX < -50) {
                    document.querySelector('.delete-badge').style.opacity = Math.min(Math.abs(diffX) / 150, 1);
                    document.querySelector('.keep-badge').style.opacity = '0';
                } else if (diffX > 50) {
                    document.querySelector('.keep-badge').style.opacity = Math.min(Math.abs(diffX) / 150, 1);
                    document.querySelector('.delete-badge').style.opacity = '0';
                } else {
                    document.querySelector('.keep-badge').style.opacity = '0';
                    document.querySelector('.delete-badge').style.opacity = '0';
                }
            }
        }, { passive: false });

        card.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;

            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;
            const threshold = 100;

            if (Math.abs(diffX) > threshold) {
                if (diffX < -threshold) {
                    makeDecision('delete');
                } else if (diffX > threshold) {
                    makeDecision('keep');
                }
            } else {
                resetCard();
            }
        });

        // Mouse events for desktop
        let isMouseDown = false;
        card.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            touchStartX = e.clientX;
            touchStartY = e.clientY;
            card.classList.add('dragging');
        });

        document.addEventListener('mousemove', (e) => {
            if (!isMouseDown) return;

            const diffX = e.clientX - touchStartX;
            const diffY = e.clientY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                const rotate = (diffX / window.innerWidth) * 20;
                card.style.transform = `translateX(${diffX}px) rotateZ(${rotate}deg)`;

                if (diffX < -50) {
                    document.querySelector('.delete-badge').style.opacity = Math.min(Math.abs(diffX) / 150, 1);
                    document.querySelector('.keep-badge').style.opacity = '0';
                } else if (diffX > 50) {
                    document.querySelector('.keep-badge').style.opacity = Math.min(Math.abs(diffX) / 150, 1);
                    document.querySelector('.delete-badge').style.opacity = '0';
                } else {
                    document.querySelector('.keep-badge').style.opacity = '0';
                    document.querySelector('.delete-badge').style.opacity = '0';
                }
            }
        });

        document.addEventListener('mouseup', (e) => {
            if (!isMouseDown) return;
            isMouseDown = false;

            const diffX = e.clientX - touchStartX;
            const threshold = 100;

            if (Math.abs(diffX) > threshold) {
                if (diffX < -threshold) {
                    makeDecision('delete');
                } else if (diffX > threshold) {
                    makeDecision('keep');
                }
            } else {
                resetCard();
            }
        });

        function makeDecision(decision) {
            decisions[currentIndex] = decision;
            
            // Animate card out
            const direction = decision === 'delete' ? -1 : 1;
            card.style.transition = 'all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
            card.style.transform = `translateX(${direction * window.innerWidth}px) rotateZ(${direction * 30}deg)`;
            card.style.opacity = '0';

            setTimeout(() => {
                currentIndex++;
                card.style.transition = 'none';
                card.style.opacity = '1';
                showPhoto();
            }, 300);
        }

        function updateProgress() {
            const progress = (currentIndex / photos.length) * 100;
            progressText.textContent = `${currentIndex} / ${photos.length}`;
            progressFill.style.width = progress + '%';
        }

        function showSummary() {
            swipeContainer.classList.remove('active');
            summarySection.classList.add('active');

            const deleteCount = Object.values(decisions).filter(d => d === 'delete').length;
            const keepCount = Object.values(decisions).filter(d => d === 'keep').length;
            const total = photos.length;
            const percentKeep = total > 0 ? Math.round((keepCount / total) * 100) : 0;

            document.getElementById('totalPhotos').textContent = total;
            document.getElementById('deleteCount').textContent = deleteCount;
            document.getElementById('keepCount').textContent = keepCount;
            document.getElementById('percentKeep').textContent = percentKeep + '%';
        }

        function resetApp() {
            photos = [];
            currentIndex = 0;
            decisions = {};
            photoInput.value = '';
            
            uploadSection.style.display = 'block';
            swipeContainer.classList.remove('active');
            summarySection.classList.remove('active');
        }

        function exportResults() {
            const deleteList = Object.entries(decisions)
                .filter(([_, decision]) => decision === 'delete')
                .map(([index]) => `Photo ${parseInt(index) + 1}`)
                .join('\n');

            const summary = `Photo Curation Report
========================
Total Photos: ${photos.length}
To Delete: ${Object.values(decisions).filter(d => d === 'delete').length}
To Keep: ${Object.values(decisions).filter(d => d === 'keep').length}

Photos Marked for Deletion:
${deleteList || 'None'}`;

            // Copy to clipboard and show confirmation
            navigator.clipboard.writeText(summary).then(() => {
                alert('Curation report copied to clipboard!');
            });
        }
    </script>
</body>
</html>
