<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Noo:r — Dungeon Crawler Mockup</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #030304;
    color: #E2E8F0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    letter-spacing: -0.01em;
}

body {
    touch-action: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

.game-container {
    position: relative;
    width: min(100vw, 480px);
    height: min(100vh, 850px);
    border-radius: 32px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.04);
    background: #050507;
    box-shadow: 0 50px 120px -30px rgba(0,0,0,0.95);
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}

/* PREMIUM APPLE-INSPIRED UI OVERLAYS */
.hud-layer {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 24px;
    background: linear-gradient(to bottom, rgba(5,5,7,0.9), rgba(5,5,7,0));
    pointer-events: none;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 100;
}

.hud-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.character-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
}

.hp-container {
    width: 120px;
    height: 3px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    overflow: hidden;
}

.hp-bar {
    width: 100%;
    height: 100%;
    background: #FFFFFF;
    box-shadow: 0 0 8px #FFFFFF;
    transform-origin: left;
    transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.hud-right {
    text-align: right;
}

.stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(226, 232, 240, 0.35);
}

.stat-value {
    font-size: 24px;
    font-weight: 200;
    color: #FFFFFF;
}

.ability-dock {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    padding: 8px 16px;
    background: rgba(10, 10, 15, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 100px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    z-index: 100;
    pointer-events: none;
}

.ability-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
}
.ability-icon.active {
    color: #FFF;
    border-color: rgba(255,255,255,0.3);
}

/* SCREEN STATES */
.screen-state {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050507;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 500;
}

.screen-state.show {
    opacity: 1;
    pointer-events: auto;
}

.screen-state h2 {
    font-size: 32px;
    font-weight: 200;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    color: #FFFFFF;
}

.screen-state p {
    color: rgba(226, 232, 240, 0.4);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 32px;
    max-width: 280px;
}

.class-selector {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
}

.class-card {
    padding: 14px 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    transition: all 0.2s ease;
}

.class-card.selected {
    background: #FFFFFF;
    color: #050507;
    border-color: #FFFFFF;
    box-shadow: 0 10px 25px -5px rgba(255,255,255,0.2);
}

.action-btn {
    padding: 14px 40px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #050507;
    background: #FFFFFF;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 12px 30px -5px rgba(255,255,255,0.2);
    transition: transform 0.2s ease, opacity 0.2s ease;
}
.action-btn:hover { transform: translateY(-2px); }
.action-btn:active { transform: translateY(0); }

@media (max-width: 768px) {
    .game-container { width: 100vw; height: 100vh; border-radius: 0; border: none; }
}
</style>
</head>
<body>

<div class="game-container">
    
    <!-- HUD LAYER -->
    <div class="hud-layer">
        <div class="hud-left">
            <div class="character-badge" id="hudClass">Warrior</div>
            <div class="hp-container">
                <div class="hp-bar" id="hudHp"></div>
            </div>
        </div>
        <div class="hud-right">
            <div class="stat-label">Depth Room</div>
            <div class="stat-value" id="hudRoom">1</div>
        </div>
    </div>

    <!-- ABILITY DISPLAY DOCK -->
    <div class="ability-dock">
        <div class="ability-icon active" id="skill1">⚔️</div>
        <div class="ability-icon active" id="skill2">💨</div>
        <div class="ability-icon" id="skill3">◇</div>
    </div>

    <canvas id="dungeonCanvas"></canvas>

    <!-- CLASS SELECTION SCREEN -->
    <div class="screen-state show" id="startScreen">
        <h2>Noo:r</h2>
        <p>A minimalist dark fantasy dungeon loop. Navigate chambers using tap swipes or WASD controls.</p>
        
        <div class="class-selector">
            <div class="class-card selected" onclick="selectClass('warrior')">WARRIOR</div>
            <div class="class-card" onclick="selectClass('rogue')">ROGUE</div>
            <div class="class-card" onclick="selectClass('mage')">MAGE</div>
        </div>

        <button class="action-btn" onclick="startGame()">DESCEND</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen-state" id="gameOverScreen">
        <h2 id="endTitle">Returned to Dust</h2>
        <p id="endSubtitle">Chambers Cleared: 0</p>
        <button class="action-btn" onclick="showStartScreen()">AWAKEN</button>
    </div>
</div>

<script>
const canvas = document.getElementById('dungeonCanvas');
const ctx = canvas.getContext('2d');

// --- ENGINE RECONCILIATION CONFIG ---
let currentClass = 'warrior';
let gameActive = false;
let roomNumber = 1;

const CELL_SIZE = 64;
const GRID_COLS = 7;
const GRID_ROWS = 9;

// Centering logic variables
let originX = 0;
let originY = 0;

let player = {
    gridX: 3, gridY: 7,
    x: 0, y: 0,
    hp: 3, maxHp: 3,
    color: '#FFFFFF',
    auraColor: 'rgba(255,255,255,0.2)',
    weaponType: 'slash',
    isDashing: false,
    dashTimer: 0
};

let enemies = [];
let particles = [];
let floatingTexts = [];
let structuralDecorations = []; // Torches, runes, elevator nodes
let screenShake = 0;
let timeClock = 0;
let lastFrameTime = performance.now();

// --- ARCHETYPES SCHEME ---
const HERO_CONFIGS = {
    warrior: { name: 'Warrior', color: '#FFFFFF', aura: 'rgba(255,255,255,0.25)', weapon: 'slash', hp: 4 },
    rogue: { name: 'Rogue', color: '#A3A3A3', aura: 'rgba(14, 165, 233, 0.2)', weapon: 'dash', hp: 3 },
    mage: { name: 'Mage', color: '#E2E8F0', aura: 'rgba(168, 85, 247, 0.3)', weapon: 'bolt', hp: 3 }
};

function resizeCanvas() {
    const container = document.querySelector('.game-container');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    
    // Dynamically balance centering grid math layouts
    originX = (canvas.width - (GRID_COLS * CELL_SIZE)) / 2;
    originY = (canvas.height - (GRID_ROWS * CELL_SIZE)) / 2;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- SYSTEM LOGIC SYSTEM ENTRIES ---
function selectClass(type) {
    currentClass = type;
    document.querySelectorAll('.class-card').forEach(card => {
        card.classList.remove('selected');
        if(card.textContent.toLowerCase() === type) card.classList.add('selected');
    });
}

function showStartScreen() {
    document.getElementById('gameOverScreen').classList.remove('show');
    document.getElementById('startScreen').classList.add('show');
}

function startGame() {
    document.getElementById('startScreen').classList.remove('show');
    document.getElementById('gameOverScreen').classList.remove('show');
    
    const cfg = HERO_CONFIGS[currentClass];
    player.hp = cfg.hp;
    player.maxHp = cfg.hp;
    player.color = cfg.color;
    player.auraColor = cfg.aura;
    player.weaponType = cfg.weapon;
    player.gridX = 3;
    player.gridY = 7;
    player.x = originX + player.gridX * CELL_SIZE + CELL_SIZE/2;
    player.y = originY + player.gridY * CELL_SIZE + CELL_SIZE/2;
    
    document.getElementById('hudClass').textContent = cfg.name;
    document.getElementById('skill1').textContent = cfg.weapon === 'slash' ? '⚔️' : (cfg.weapon === 'dash' ? '🗡️' : '🔮');
    
    roomNumber = 1;
    generateChamber();
    gameActive = true;
}

function generateChamber() {
    enemies = [];
    structuralDecorations = [];
    particles = [];
    
    document.getElementById('hudRoom').textContent = roomNumber;
    
    // Establish environment markers
    structuralDecorations.push({ x: 1, y: 1, type: 'torch', pulse: 0 });
    structuralDecorations.push({ x: 5, y: 1, type: 'torch', pulse: Math.PI });
    structuralDecorations.push({ x: 3, y: 4, type: 'elevator_rune', active: false });

    // Enemy Scaling Logic Matrix
    let enemyCount = 2 + Math.min(3, Math.floor(roomNumber / 2));
    if (roomNumber % 5 === 0) {
        // Boss Room Entry
        spawnEnemy('guardian', 3, 2);
    } else {
        const types = ['knight', 'wisp', 'brute', 'spider'];
        for (let i = 0; i < enemyCount; i++) {
            let tx = 1 + Math.floor(Math.random() * 5);
            let ty = 1 + Math.floor(Math.random() * 4);
            // Ensure spacing from initial entry floor
            if (tx === player.gridX && ty === player.gridY) { tx += 1; }
            
            let selectedType = types[Math.floor(Math.random() * types.length)];
            spawnEnemy(selectedType, tx, ty);
        }
    }
}

function spawnEnemy(type, gx, gy) {
    let e = {
        type: type,
        gridX: gx, gridY: gy,
        x: originX + gx * CELL_SIZE + CELL_SIZE/2,
        y: originY + gy * CELL_SIZE + CELL_SIZE/2,
        hp: 1, maxHp: 1,
        color: '#FFFFFF', size: 16,
        behaviorTimer: Math.random() * 2
    };
    
    if (type === 'knight') { e.hp = 2; e.maxHp = 2; e.color = '#475569'; e.size = 18; }
    if (type === 'wisp') { e.hp = 1; e.color = '#06B6D4'; e.size = 10; }
    if (type === 'brute') { e.hp = 4; e.maxHp = 4; e.color = '#1E293B'; e.size = 24; }
    if (type === 'spider') { e.hp = 1; e.color = '#0F172A'; e.size = 8; }
    if (type === 'guardian') { e.hp = 12; e.maxHp = 12; e.color = '#334155'; e.size = 40; }
    
    enemies.push(e);
}

// --- CONTROLS PIPELINE ---
window.addEventListener('keydown', e => {
    if(!gameActive) return;
    let dx = 0, dy = 0;
    if(e.key.toLowerCase() === 'w' || e.key === 'ArrowUp') dy = -1;
    if(e.key.toLowerCase() === 's' || e.key === 'ArrowDown') dy = 1;
    if(e.key.toLowerCase() === 'a' || e.key === 'ArrowLeft') dx = -1;
    if(e.key.toLowerCase() === 'd' || e.key === 'ArrowRight') dx = 1;
    
    if(dx !== 0 || dy !== 0) {
        attemptPlayerMove(dx, dy);
    }
});

// Touch swipe logic
let touchX = 0, touchY = 0;
window.addEventListener('touchstart', e => {
    touchX = e.touches[0].clientX;
    touchY = e.touches[0].clientY;
}, { passive: true });

window.addEventListener('touchend', e => {
    if(!gameActive) return;
    let dx = e.changedTouches[0].clientX - touchX;
    let dy = e.changedTouches[0].clientY - touchY;
    if(Math.abs(dx) > 30 || Math.abs(dy) > 30) {
        if(Math.abs(dx) > Math.abs(dy)) {
            attemptPlayerMove(dx > 0 ? 1 : -1, 0);
        } else {
            attemptPlayerMove(0, dy > 0 ? 1 : -1);
        }
    }
}, { passive: true });

function attemptPlayerMove(dx, dy) {
    if(player.isDashing) return;
    
    let targetX = player.gridX + dx;
    let targetY = player.gridY + dy;
    
    // Bounds restriction check 
    if(targetX < 0 || targetX >= GRID_COLS || targetY < 0 || targetY >= GRID_ROWS) return;
    
    // Engage action move execution
    player.gridX = targetX;
    player.gridY = targetY;
    player.isDashing = true;
    player.dashTimer = 0.12; // Dash length motion window
    
    executeCombatAction();
    processEnemyTurns();
}

// --- ACTION LOGIC COMBAT PASS ---
function executeCombatAction() {
    let pTargetX = originX + player.gridX * CELL_SIZE + CELL_SIZE/2;
    let pTargetY = originY + player.gridY * CELL_SIZE + CELL_SIZE/2;
    
    // Combat mechanics visual generation
    if (player.weaponType === 'slash') {
        createParticleBurst(pTargetX, pTargetY, 'rgba(255,255,255,0.4)', 15);
        triggerScreenActionGlow('circular_slash', pTargetX, pTargetY);
    } else if (player.weaponType === 'dash') {
        createParticleBurst(player.x, player.y, 'rgba(14, 165, 233, 0.4)', 8);
        triggerScreenActionGlow('motion_blur', player.x, player.y);
    } else if (player.weaponType === 'bolt') {
        triggerScreenActionGlow('particle_trail', pTargetX, pTargetY);
    }

    // Direct collision check across positions
    enemies.forEach((en, idx) => {
        let dist = Math.hypot(en.gridX - player.gridX, en.gridY - player.gridY);
        if (dist <= 1.1) {
            let dmg = player.weaponType === 'slash' ? 2 : 1;
            en.hp -= dmg;
            screenShake = 12;
            createParticleBurst(en.x, en.y, '#FF0033', 12);
            
            if(en.hp <= 0) {
                createFloatingText(en.x, en.y, "CRUSHED", '#FFFFFF');
                enemies.splice(idx, 1);
            } else {
                createFloatingText(en.x, en.y, `-${dmg}`, 'rgba(255,255,255,0.7)');
            }
        }
    });

    // Check elevator completion check
    if (enemies.length === 0) {
        let elevator = structuralDecorations.find(d => d.type === 'elevator_rune');
        if(elevator) elevator.active = true;
        
        if (player.gridX === 3 && player.gridY === 4) {
            roomNumber++;
            createFloatingText(player.x, player.y, "DESCENDING...", '#FFFFFF');
            screenShake = 20;
            setTimeout(generateChamber, 400);
        }
    }
}

function processEnemyTurns() {
    enemies.forEach(en => {
        let ex = en.gridX;
        let ey = en.gridY;
        
        // Behavioral path determination tracking player location vectors
        let dx = Math.sign(player.gridX - ex);
        let dy = Math.sign(player.gridY - ey);
        
        if (en.type === 'wisp') {
            // Unpredictable float paths
            if (Math.random() > 0.4) { ex += (Math.random() > 0.5 ? 1 : -1); }
        } else if (en.type === 'brute') {
            // Sluggish movement processing
            if (Math.random() > 0.5) {
                if (Math.random() > 0.5) ex += dx; else ty = ey += dy;
            }
        } else if (en.type === 'spider') {
            // Aggressive twitch step mechanics
            if (Math.abs(player.gridX - ex) > Math.abs(player.gridY - ey)) ex += dx; else ey += dy;
        } else {
            // standard Hollow Knight logic pathing
            if (Math.random() > 0.2) {
                if (Math.random() > 0.5) ex += dx; else ey += dy;
            }
        }

        // Lock boundaries verification check
        en.gridX = Math.max(1, Math.min(GRID_COLS - 2, ex));
        en.gridY = Math.max(1, Math.min(GRID_ROWS - 2, ey));
        
        en.x = originX + en.gridX * CELL_SIZE + CELL_SIZE/2;
        en.y = originY + en.gridY * CELL_SIZE + CELL_SIZE/2;

        // Player Impact Calculation 
        if (en.gridX === player.gridX && en.gridY === player.gridY) {
            player.hp--;
            screenShake = 18;
            createParticleBurst(player.x, player.y, '#FF1E27', 20);
            createFloatingText(player.x, player.y, "STALL", '#FF1E27');
            
            if (player.hp <= 0) {
                gameActive = false;
                document.getElementById('endSubtitle').textContent = `Chambers Cleared: ${roomNumber - 1}`;
                document.getElementById('gameOverScreen').classList.add('show');
            }
        }
    });
}

// --- GRAPHICS FX GENERATION ENGINE ---
function createParticleBurst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        let angle = Math.random() * Math.PI * 2;
        let speed = 1 + Math.random() * 4;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            alpha: 1,
            size: 1.5 + Math.random() * 2,
            color: color
        });
    }
}

function createFloatingText(x, y, str, color) {
    floatingTexts.push({
        x: x, y: y - 10, text: str, color: color, alpha: 1, speedY: -0.8
    });
}

function triggerScreenActionGlow(type, x, y) {
    if (type === 'circular_slash') {
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, y, 48, 0, Math.PI * 2); ctx.stroke();
        ctx.restore();
    }
}

// --- UPDATE & RENDER REAL-TIME ENGINE LOOP ---
function updateSimulation(dt) {
    timeClock += dt;
    
    // Smooth frame lerp calculations
    let targetX = originX + player.gridX * CELL_SIZE + CELL_SIZE/2;
    let targetY = originY + player.gridY * CELL_SIZE + CELL_SIZE/2;
    player.x += (targetX - player.x) * 0.25;
    player.y += (targetY - player.y) * 0.25;
    
    if (player.isDashing) {
        player.dashTimer -= dt;
        if(player.dashTimer <= 0) player.isDashing = false;
    }

    // Process tracking vectors inside text arrays
    particles.forEach((p, idx) => {
        p.x += p.vx; p.y += p.vy;
        p.alpha -= 1.4 * dt;
        if(p.alpha <= 0) particles.splice(idx, 1);
    });

    floatingTexts.forEach((t, idx) => {
        t.y += t.speedY;
        t.alpha -= 1.1 * dt;
        if(t.alpha <= 0) floatingTexts.splice(idx, 1);
    });

    structuralDecorations.forEach(d => {
        if(d.type === 'torch') d.pulse += dt * 4;
    });

    if (screenShake > 0) screenShake *= 0.88;
    
    // Update premium DOM layout indicators
    document.getElementById('hudHp').style.transform = `scaleX(${Math.max(0, player.hp / player.maxHp)})`;
}

function renderScene() {
    ctx.fillStyle = '#040406';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
    }

    // DRAW ABSTRACT GEOMETRIC DUNGEON MATRIX FLOOR
    for (let c = 0; c < GRID_COLS; c++) {
        for (let r = 0; r < GRID_ROWS; r++) {
            let rx = originX + c * CELL_SIZE;
            let ry = originY + r * CELL_SIZE;
            
            // Generate visual chamber profile boundaries
            if (c === 0 || c === GRID_COLS - 1 || r === 0 || r === GRID_ROWS - 1) {
                ctx.fillStyle = '#08080C';
                ctx.fillRect(rx + 2, ry + 2, CELL_SIZE - 4, CELL_SIZE - 4);
            } else {
                ctx.fillStyle = '#0D0D13';
                ctx.fillRect(rx + 1, ry + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            }
        }
    }

    // ENVIRONMENTAL HIGHLIGHT STRUCTURAL DECORATIONS
    structuralDecorations.forEach(d => {
        let dx = originX + d.x * CELL_SIZE + CELL_SIZE/2;
        let dy = originY + d.y * CELL_SIZE + CELL_SIZE/2;
        
        if (d.type === 'torch') {
            let flick = Math.sin(d.pulse) * 3;
            let grad = ctx.createRadialGradient(dx, dy, 1, dx, dy, 24 + flick);
            grad.addColorStop(0, 'rgba(245, 158, 11, 0.25)');
            grad.addColorStop(1, 'rgba(245, 158, 11, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(dx, dy, 24 + flick, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = '#F59E0B';
            ctx.beginPath(); ctx.arc(dx, dy, 3, 0, Math.PI * 2); ctx.fill();
        } else if (d.type === 'elevator_rune') {
            ctx.strokeStyle = d.active ? '#06B6D4' : 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.save();
            if(d.active) { ctx.shadowBlur = 10; ctx.shadowColor = '#06B6D4'; }
            ctx.beginPath(); ctx.roundRect(dx - 16, dy - 16, 32, 32, 4); ctx.stroke();
            ctx.restore();
        }
    });

    // DRAW ENEMIES (SILHOUETTES WITH GLOWING EYES / ABSTRACT SHAPES)
    enemies.forEach(en => {
        ctx.save();
        ctx.fillStyle = en.color;
        
        if (en.type === 'wisp') {
            let pulseSize = en.size + Math.sin(timeClock * 6) * 2;
            let grad = ctx.createRadialGradient(en.x, en.y, 1, en.x, en.y, pulseSize * 2);
            grad.addColorStop(0, 'rgba(6, 182, 212, 0.4)');
            grad.addColorStop(1, 'rgba(6, 182, 212, 0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(en.x, en.y, pulseSize * 2, 0, Math.PI * 2); ctx.fill();
            
            ctx.fillStyle = '#06B6D4';
            ctx.beginPath(); ctx.arc(en.x, en.y, en.size/2, 0, Math.PI * 2); ctx.fill();
        } else if (en.type === 'brute') {
            // Monolithic cube creature
            ctx.fillStyle = '#1A1A24';
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.roundRect(en.x - en.size/2, en.y - en.size/2, en.size, en.size, 4); ctx.fill(); ctx.stroke();
            
            // Small glowing Crimson dots for eye slits
            ctx.fillStyle = '#EF4444';
            ctx.fillRect(en.x - 6, en.y - 4, 3, 2);
            ctx.fillRect(en.x + 3, en.y - 4, 3, 2);
        } else if (en.type === 'guardian') {
            // Giant Monolithic Core Boss
            ctx.fillStyle = '#0A0A0F';
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(en.x - en.size/2, en.y - en.size/2, en.size, en.size, 8); ctx.fill(); ctx.stroke();
            
            // Giant ancient rune eye glow
            ctx.strokeStyle = '#EF4444';
            ctx.shadowBlur = 15; ctx.shadowColor = '#EF4444';
            ctx.beginPath(); ctx.arc(en.x, en.y, 8 + Math.sin(timeClock*4)*2, 0, Math.PI*2); ctx.stroke();
        } else {
            // Hollow Knight default humanoids
            ctx.fillStyle = '#111116';
            ctx.beginPath(); ctx.roundRect(en.x - 7, en.y - 12, 14, 24, 4); ctx.fill();
            // Cyan glowing pinprick eyes
            ctx.fillStyle = '#22D3EE';
            ctx.fillRect(en.x - 3, en.y - 6, 1.5, 1.5);
            ctx.fillRect(en.x + 1, en.y - 6, 1.5, 1.5);
        }
        ctx.restore();
    });

    // DRAW MAIN HERO CHARACTER
    ctx.save();
    // Atmospheric character aura base layering
    let charGrad = ctx.createRadialGradient(player.x, player.y, 2, player.x, player.y, 40);
    charGrad.addColorStop(0, player.auraColor);
    charGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = charGrad;
    ctx.beginPath(); ctx.arc(player.x, player.y, 40, 0, Math.PI * 2); ctx.fill();

    // Pure minimalist geometric character outline block
    ctx.fillStyle = '#FFFFFF';
    ctx.shadowBlur = 12; ctx.shadowColor = '#FFFFFF';
    ctx.beginPath();
    ctx.roundRect(player.x - 8, player.y - 10, 16, 20, 3);
    ctx.fill();
    
    // Weapon asset element attachment rendering
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if(player.weaponType === 'slash') { // Warrior sword trail line
        ctx.moveTo(player.x + 8, player.y + 2); ctx.lineTo(player.x + 18, player.y - 6);
    } else if (player.weaponType === 'dash') { // Rogue twin small accents
        ctx.moveTo(player.x - 10, player.y + 4); ctx.lineTo(player.x - 14, player.y);
        ctx.moveTo(player.x + 10, player.y + 4); ctx.lineTo(player.x + 14, player.y);
    } else { // Mage floating geometric wand staff dot
        let floatOffset = Math.sin(timeClock * 5) * 3;
        ctx.fillStyle = '#C084FC'; ctx.shadowColor = '#C084FC';
        ctx.arc(player.x + 12, player.y - 8 + floatOffset, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.stroke();
    ctx.restore();

    // RENDERING PASS PARTICLES SYSTEM PACKET
    ctx.save();
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    });
    ctx.restore();

    // RENDERING OVERLAY PASS TEXT DATA PACKET
    ctx.save();
    floatingTexts.forEach(t => {
        ctx.save();
        ctx.globalAlpha = t.alpha;
        ctx.fillStyle = t.color;
        ctx.font = "900 10px 'Inter', sans-serif";
        ctx.letterSpacing = "0.1em";
        ctx.textAlign = 'center';
        ctx.fillText(t.text, t.x, t.y);
        ctx.restore();
    });
    ctx.restore();

    // VIGNETTE CINEMATIC FOG HIGH-CONTRAST COVER LAYER EFFECT
    let vignette = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.2, canvas.width/2, canvas.height/2, canvas.height * 0.6);
    vignette.addColorStop(0, 'rgba(3, 3, 4, 0)');
    vignette.addColorStop(0.6, 'rgba(3, 3, 4, 0.4)');
    vignette.addColorStop(1, 'rgba(3, 3, 4, 0.98)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.restore();
}

function executionLoop() {
    let now = performance.now();
    let dt = (now - lastFrameTime) / 1000;
    if(dt > 0.1) dt = 0.1; // Execution safeguard threshold clamp
    lastFrameTime = now;

    if (gameActive) {
        updateSimulation(dt);
    }
    renderScene();
    requestAnimationFrame(executionLoop);
}

// Spark up deployment sequence engine systems
requestAnimationFrame(executionLoop);
</script>
</body>
</html>
