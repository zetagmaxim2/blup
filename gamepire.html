<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PORTFOLIO">
    <meta name="theme-color" content="#0a0a0a">
    <title>Portfolio Empire</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ececec;
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            user-select: none;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            color: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: #0a0a0a;
        }

        .header {
            padding: 46px 20px 16px;
            border-bottom: 1px solid #1a1a1a;
            background: #0a0a0a;
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        .header-content {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-title h1 {
            font-size: 20px;
            margin: 0;
        }

        .rank-badge {
            background: rgba(255, 107, 53, 0.15);
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 12px;
            color: #ff6b35;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .content {
            flex: 1;
            padding: 16px 20px;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        button {
            padding: 12px 16px;
            border-radius: 6px;
            border: none;
            background: #ff6b35;
            color: #0a0a0a;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        button:active {
            background: #e55a24;
            transform: scale(0.92);
        }

        .month-selector {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .month-nav-btn {
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #242424;
            background: #141414;
            color: #ff6b35;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
        }

        .month-display {
            font-size: 12px;
            color: #888888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            min-width: 80px;
            text-align: center;
        }

    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="header-left">

                <div>
                    <h1>Sunburn</h1>
                    <div class="header-subtitle">Dumbire</div>
                </div>
            </div>
            <div class="rank-badge" id="rankDisplay">
                <svg class="rank-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 1[...]>
                </svg>
                <span id="rankText">Rookie</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="content">

            <div class="card card-sm">
                <div class="month-selector">
                    <button class="month-nav-btn" onclick="changeMonth(-1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <div class="month-display" id="monthDisplay">June 2026</div>
                    <button class="month-nav-btn" onclick="changeMonth(1)">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>

                    <!-- New Recalculate Button -->
                    <button class="month-nav-btn" id="recalculateButton" onclick="recalculate()">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2v20m10-10H2" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function recalculate() {
            console.log("Recalculating...");
            updateStockDisplay();
        }

        function changeMonth(amount) {
            console.log("Changing month by: ", amount);
        }

        function updateStockDisplay() {
            console.log("Updating stock display...");
        }
    </script>
</body>
</html>
