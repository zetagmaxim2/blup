<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PORTFOLIO">
    <meta name="theme-color" content="#0a0a0a">
    <title>Portfolio Empire</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            color: #ececec;
            -webkit-font-smoothing: antialiased;
            user-select: none;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            color: #ffffff;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: env(safe-area-inset-top);
            background: #0a0a0a;
        }

        .header {
            padding: 20px;
            background: #141414;
            border-bottom: 1px solid #202020;
        }

        .header h1 {
            font-size: 24px;
            color: #ffffff;
        }

        .content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .month-display {
            font-size: 16px;
            color: #ffffff;
        }

        button {
            background: #ff6b35;
            color: #ffffff;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Portfolio Empire</h1>
        </div>
        <div class="content">
            <div class="month-selector">
                <button onclick="changeMonth(-1)">Previous</button>
                <div class="month-display" id="monthDisplay">June 2026</div>
                <button onclick="changeMonth(1)">Next</button>
                <button onclick="recalculate()">Recalculate</button>
            </div>
        </div>
    </div>

    <script>
        function recalculate() {
            alert("Recalculating data!");
        }

        function changeMonth(direction) {
            alert("Changing month: " + direction);
        }
    </script>
</body>
</html>
