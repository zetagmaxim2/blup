<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PULSE SHIFT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0a0a0a;
    color:#f5f5f5;
    font-family:Inter,Arial,sans-serif;
}

body{
    touch-action:none;
}

.game-container{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    background:#0a0a0a;
}

.top-bar{
    position:absolute;
    top:0;
    left:0;
    right:0;
    z-index:100;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px;

    background:rgba(10,10,10,0.55);
    backdrop-filter:blur(12px);
}

.button-group-left{
    display:flex;
    gap:10px;
}

.icon-btn{
    width:44px;
    height:44px;

    border-radius:12px;

    border:1px solid rgba(247,55,79,0.15);

    background:rgba(247,55,79,0.05);

    color:#F7374F;

    cursor:pointer;

    font-size:16px;

    transition:0.15s;
}

.icon-btn:hover{
    background:rgba(247,55,79,0.12);
}

.icon-btn:active{
    transform:scale(0.95);
}

.hidden{
    display:none;
}

.score-display{
    text-align:center;
}

.score-label{
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(247,55,79,0.5);
}

.score-value{
    font-size:40px;
    font-weight:700;
}

.game-area{
    position:relative;

    width:min(100vw,500px);
    height:min(100vh,900px);

    overflow:hidden;

    background:#0f0f0f;

    border-radius:28px;
    border:1px solid rgba(247,55,79,0.08);
}

canvas{
    width:100%;
    height:100%;
    display:block;
    background:#0a0a0a;
}

.game-status{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    width:min(320px,90vw);

    padding:32px;

    border-radius:24px;

    background:rgba(20,20,20,0.96);

    border:1px solid rgba(247,55,79,0.1);

    text-align:center;

    display:none;
}

.game-status.show{
    display:block;
}

.game-status h2{
    font-size:30px;
    margin-bottom:12px;
}

.game-status p{
    color:rgba(247,55,79,0.65);
    margin-top:10px;
}

@media (max-width:768px){

    .top-bar{
        padding:12px;
    }

    .score-value{
        font-size:28px;
    }

    .game-area{
        width:100vw;
        height:100vh;
        border:none;
        border-radius:0;
    }
}
</style>
</head>
<body>

<div class="game-container">

    <div class="top-bar">

        <div class="button-group-left">
            <button class="icon-btn" id="playBtn" onclick="game.startGame()">▶</button>
            <button class="icon-btn hidden" id="pauseBtn" onclick="game.togglePause()">❚❚</button>
            <button class="icon-btn hidden" id="restartBtn" onclick="game.startGame()">↺</button>
        </div>

        <div class="score-display">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
        </div>

    </div>

    <div class="game-area">

        <canvas id="gameCanvas"></canvas>

        <div class="game-status show" id="gameStatus">
            <h2 id="statusTitle">PULSE SHIFT</h2>
            <p id="statusMessage"></p>
            <p>Rotate gravity to survive</p>
            <p>Swipe / A D / Arrow Keys</p>
        </div>

    </div>

</div>

<script>
class PulseShiftGame {

    constructor(canvas) {

        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        this.resize();

        window.addEventListener('resize', () => this.resize());

        this.gameRunning = false;
        this.gamePaused = false;

        this.score = 0;
        this.combo = 1;

        this.gravityIndex = 2;

        this.gravityDirections = [
            { x: 0, y: -1 }, // up
            { x: 1, y: 0 },  // right
            { x: 0, y: 1 },  // down
            { x: -1, y: 0 }  // left
        ];

        this.worldRotation = 0;
        this.targetRotation = 0;

        this.gravityStrength = 0.42;

        this.platforms = [];
        this.particles = [];

        this.screenShake = 0;

        this.cube = {
            x: 0,
            y: 0,
            size: 22,
            vx: 0,
            vy: 0,
            rotation: 0,
            grounded: false,
            landingCooldown: 0
        };

        this.setupInputs();

        this.gameLoop();
    }

    resize() {

        const maxWidth = Math.min(window.innerWidth, 500);
        const maxHeight = Math.min(window.innerHeight, 900);

        this.canvas.width = maxWidth;
        this.canvas.height = maxHeight;
    }

    // ---------------- INPUT ----------------

    setupInputs() {

        window.addEventListener('keydown', (e) => {

            if (!this.gameRunning || this.gamePaused) return;

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                this.rotateLeft();
            }

            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                this.rotateRight();
            }

        });

        let startX = 0;

        this.canvas.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        });

        this.canvas.addEventListener('touchend', (e) => {

            if (!this.gameRunning || this.gamePaused) return;

            const dx = e.changedTouches[0].clientX - startX;

            if (dx > 40) this.rotateRight();
            else if (dx < -40) this.rotateLeft();

        });

    }

    rotateLeft() {

        this.gravityIndex--;

        if (this.gravityIndex < 0) {
            this.gravityIndex = 3;
        }

        this.targetRotation -= Math.PI / 2;

        this.screenShake = 4;
    }

    rotateRight() {

        this.gravityIndex++;

        if (this.gravityIndex > 3) {
            this.gravityIndex = 0;
        }

        this.targetRotation += Math.PI / 2;

        this.screenShake = 4;
    }

    // ---------------- START ----------------

    startGame() {

        this.gameRunning = true;
        this.gamePaused = false;

        this.score = 0;
        this.combo = 1;

        this.gravityIndex = 2;

        this.worldRotation = 0;
        this.targetRotation = 0;

        this.platforms = [];
        this.particles = [];

        this.cube.x = this.canvas.width / 2;
        this.cube.y = 120;

        this.cube.vx = 0;
        this.cube.vy = 0;

        this.cube.grounded = false;
        this.cube.landingCooldown = 0;

        this.generatePlatforms();

        this.showUI(false);

        document.getElementById('scoreValue').textContent = "0";

        document.getElementById('playBtn').classList.add('hidden');
        document.getElementById('pauseBtn').classList.remove('hidden');
        document.getElementById('restartBtn').classList.add('hidden');
    }

    generatePlatforms() {

        this.platforms = [];

        for (let i = 0; i < 18; i++) {

            this.platforms.push({
                x: 60 + Math.random() * (this.canvas.width - 120),
                y: 120 + i * 90,
                width: 100,
                height: 16,
                type: Math.random() < 0.12 ? 'fake' : 'safe'
            });

        }

    }

    // ---------------- UPDATE ----------------

    update() {

        if (!this.gameRunning || this.gamePaused) return;

        // smooth world rotation
        this.worldRotation +=
            (this.targetRotation - this.worldRotation) * 0.12;

        const gravity =
            this.gravityDirections[this.gravityIndex];

        this.cube.vx += gravity.x * this.gravityStrength;
        this.cube.vy += gravity.y * this.gravityStrength;

        // damping
        this.cube.vx *= 0.992;
        this.cube.vy *= 0.992;

        this.cube.x += this.cube.vx;
        this.cube.y += this.cube.vy;

        this.cube.rotation += 0.05;

        if (this.cube.landingCooldown > 0) {
            this.cube.landingCooldown--;
        }

        this.handleCollisions();

        this.updateParticles();

        // lose condition
        if (
            this.cube.x < -120 ||
            this.cube.x > this.canvas.width + 120 ||
            this.cube.y < -120 ||
            this.cube.y > this.canvas.height + 120
        ) {
            this.gameOver();
        }

        // difficulty scaling
        this.gravityStrength =
            0.42 + Math.min(0.22, this.score * 0.0025);

        document.getElementById('scoreValue').textContent =
            this.score;
    }

    // ---------------- COLLISIONS ----------------

    handleCollisions() {

        if (this.cube.landingCooldown > 0) return;

        const half = this.cube.size / 2;

        for (const p of this.platforms) {

            const left = p.x - p.width / 2;
            const right = p.x + p.width / 2;

            const top = p.y - p.height / 2;
            const bottom = p.y + p.height / 2;

            if (
                this.cube.x + half > left &&
                this.cube.x - half < right &&
                this.cube.y + half > top &&
                this.cube.y - half < bottom
            ) {

                const gravity =
                    this.gravityDirections[this.gravityIndex];

                // push cube outside platform
                if (gravity.y > 0) {
                    this.cube.y = top - half;
                    this.cube.vy = -8;
                }

                else if (gravity.y < 0) {
                    this.cube.y = bottom + half;
                    this.cube.vy = 8;
                }

                else if (gravity.x > 0) {
                    this.cube.x = left - half;
                    this.cube.vx = -8;
                }

                else if (gravity.x < 0) {
                    this.cube.x = right + half;
                    this.cube.vx = 8;
                }

                // fake platform
                if (p.type === 'fake') {

                    this.createParticles(p.x, p.y, 16);

                    p.y = 99999;
                }

                this.cube.landingCooldown = 10;

                this.score += Math.floor(1 * this.combo);

                this.combo += 0.03;

                this.createParticles(
                    this.cube.x,
                    this.cube.y,
                    10
                );

                this.screenShake = 5;

                break;
            }
        }
    }

    // ---------------- PARTICLES ----------------

    createParticles(x, y, count) {

        for (let i = 0; i < count; i++) {

            const a = Math.random() * Math.PI * 2;

            this.particles.push({
                x,
                y,
                vx: Math.cos(a) * (2 + Math.random() * 3),
                vy: Math.sin(a) * (2 + Math.random() * 3),
                life: 1
            });
        }
    }

    updateParticles() {

        this.particles.forEach(p => {

            p.x += p.vx;
            p.y += p.vy;

            p.vx *= 0.98;
            p.vy *= 0.98;

            p.life -= 0.03;

        });

        this.particles =
            this.particles.filter(p => p.life > 0);
    }

    // ---------------- DRAW ----------------

    draw() {

        const ctx = this.ctx;

        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        ctx.save();

        // screenshake
        if (this.screenShake > 0) {

            ctx.translate(
                (Math.random() - 0.5) * this.screenShake,
                (Math.random() - 0.5) * this.screenShake
            );

            this.screenShake *= 0.9;
        }

        // rotate world
        ctx.translate(
            this.canvas.width / 2,
            this.canvas.height / 2
        );

        ctx.rotate(this.worldRotation);

        ctx.translate(
            -this.canvas.width / 2,
            -this.canvas.height / 2
        );

        // background grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';

        for (let x = 0; x < this.canvas.width; x += 40) {

            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, this.canvas.height);
            ctx.stroke();
        }

        for (let y = 0; y < this.canvas.height; y += 40) {

            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(this.canvas.width, y);
            ctx.stroke();
        }

        // platforms
        this.platforms.forEach(p => {

            if (p.type === 'fake') {
                ctx.fillStyle = '#ffaa00';
            } else {
                ctx.fillStyle = '#F7374F';
            }

            ctx.fillRect(
                p.x - p.width / 2,
                p.y - p.height / 2,
                p.width,
                p.height
            );
        });

        // cube
        ctx.save();

        ctx.translate(this.cube.x, this.cube.y);

        ctx.rotate(this.cube.rotation);

        ctx.shadowBlur = 20;
        ctx.shadowColor = '#ffffff';

        ctx.fillStyle = '#ffffff';

        ctx.fillRect(
            -this.cube.size / 2,
            -this.cube.size / 2,
            this.cube.size,
            this.cube.size
        );

        ctx.restore();

        // particles
        this.particles.forEach(p => {

            ctx.globalAlpha = p.life;

            ctx.fillStyle = '#ffffff';

            ctx.fillRect(p.x, p.y, 2, 2);
        });

        ctx.globalAlpha = 1;

        ctx.restore();
    }

    // ---------------- UI ----------------

    showUI(show) {

        document.getElementById('gameStatus')
            .classList.toggle('show', show);
    }

    togglePause() {

        this.gamePaused = !this.gamePaused;

        document.getElementById('pauseBtn').textContent =
            this.gamePaused ? '▶' : '❚❚';
    }

    gameOver() {

        this.gameRunning = false;

        document.getElementById('statusTitle').textContent =
            'CORE LOST';

        document.getElementById('statusMessage').textContent =
            `Score: ${this.score}`;

        this.showUI(true);

        document.getElementById('playBtn')
            .classList.remove('hidden');

        document.getElementById('pauseBtn')
            .classList.add('hidden');

        document.getElementById('restartBtn')
            .classList.remove('hidden');
    }

    // ---------------- LOOP ----------------

    gameLoop() {

        const loop = () => {

            this.update();
            this.draw();

            requestAnimationFrame(loop);
        };

        loop();
    }
}

const canvas = document.getElementById('gameCanvas');

const game = new PulseShiftGame(canvas);

window.game = game;
</script>
</body>
</html>
