<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEON DRIFT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0a0a0a;
    font-family:Inter,Arial,sans-serif;
    color:#fff;
}

body{
    touch-action:none;
}

.game-container{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0a0a0a;
}

.game-area{
    position:relative;
    width:min(100vw,500px);
    height:min(100vh,900px);
    overflow:hidden;
    background:#0d0d0d;
    border-radius:28px;
    border:1px solid rgba(247,55,79,0.08);
}

canvas{
    width:100%;
    height:100%;
    display:block;
}

.top-bar{
    position:absolute;
    top:0;
    left:0;
    right:0;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px;

    z-index:50;

    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.55),
        transparent
    );
}

.score-box{
    display:flex;
    flex-direction:column;
}

.label{
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:rgba(247,55,79,0.55);
}

.value{
    font-size:38px;
    font-weight:700;
}

.controls{
    display:flex;
    gap:10px;
}

.btn{
    width:44px;
    height:44px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(247,55,79,0.08);

    color:#F7374F;

    font-size:18px;

    cursor:pointer;

    transition:0.15s;
}

.btn:hover{
    background:rgba(247,55,79,0.15);
}

.btn:active{
    transform:scale(0.95);
}

.hidden{
    display:none;
}

.overlay{
    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    z-index:100;

    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(8px);
}

.panel{
    width:min(340px,90vw);

    padding:32px;

    border-radius:26px;

    background:rgba(20,20,20,0.95);

    border:1px solid rgba(247,55,79,0.12);

    text-align:center;
}

.panel h1{
    font-size:34px;
    margin-bottom:12px;
}

.panel p{
    margin-top:12px;
    color:rgba(255,255,255,0.6);
    line-height:1.5;
}

.highlight{
    color:#F7374F;
}

@media(max-width:768px){

    .game-area{
        width:100vw;
        height:100vh;
        border-radius:0;
        border:none;
    }

    .value{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="game-container">

    <div class="game-area">

        <div class="top-bar">

            <div class="controls">
                <button class="btn" id="playBtn">▶</button>
                <button class="btn hidden" id="pauseBtn">❚❚</button>
                <button class="btn hidden" id="restartBtn">↺</button>
            </div>

            <div class="score-box">
                <div class="label">Score</div>
                <div class="value" id="scoreValue">0</div>
            </div>

        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="overlay" id="overlay">

            <div class="panel">

                <h1>NEON DRIFT</h1>

                <p>
                    Dodge the falling walls.<br>
                    Pass through gaps to score.
                </p>

                <p class="highlight">
                    Hold left/right or swipe
                </p>

            </div>

        </div>

    </div>

</div>

<script>

class NeonDrift {

    constructor(canvas){

        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        this.resize();

        window.addEventListener('resize',()=>this.resize());

        this.running = false;
        this.paused = false;

        this.score = 0;
        this.best = 0;

        this.speed = 4;

        this.leftPressed = false;
        this.rightPressed = false;

        this.particles = [];

        this.screenShake = 0;

        this.spawnTimer = 0;

        this.player = {
            x:0,
            y:0,
            size:24,
            vx:0,
            trail:[]
        };

        this.walls = [];

        this.setupInputs();

        this.loop();
    }

    resize(){

        const maxWidth = Math.min(window.innerWidth,500);
        const maxHeight = Math.min(window.innerHeight,900);

        this.canvas.width = maxWidth;
        this.canvas.height = maxHeight;
    }

    setupInputs(){

        // keyboard

        window.addEventListener('keydown',(e)=>{

            if(e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a'){
                this.leftPressed = true;
            }

            if(e.key === 'ArrowRight' || e.key.toLowerCase() === 'd'){
                this.rightPressed = true;
            }

        });

        window.addEventListener('keyup',(e)=>{

            if(e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a'){
                this.leftPressed = false;
            }

            if(e.key === 'ArrowRight' || e.key.toLowerCase() === 'd'){
                this.rightPressed = false;
            }

        });

        // touch

        let startX = 0;

        this.canvas.addEventListener('touchstart',(e)=>{

            startX = e.touches[0].clientX;

        });

        this.canvas.addEventListener('touchmove',(e)=>{

            const x = e.touches[0].clientX;

            const dx = x - startX;

            this.leftPressed = dx < -10;
            this.rightPressed = dx > 10;

        });

        this.canvas.addEventListener('touchend',()=>{

            this.leftPressed = false;
            this.rightPressed = false;

        });

        // buttons

        document.getElementById('playBtn')
            .addEventListener('click',()=>this.start());

        document.getElementById('restartBtn')
            .addEventListener('click',()=>this.start());

        document.getElementById('pauseBtn')
            .addEventListener('click',()=>this.togglePause());
    }

    start(){

        this.running = true;
        this.paused = false;

        this.score = 0;
        this.speed = 4;

        this.walls = [];
        this.particles = [];

        this.player.x = this.canvas.width / 2;
        this.player.y = this.canvas.height * 0.78;
        this.player.vx = 0;
        this.player.trail = [];

        this.spawnTimer = 0;

        this.hideOverlay();

        document.getElementById('scoreValue').textContent = '0';

        document.getElementById('playBtn')
            .classList.add('hidden');

        document.getElementById('pauseBtn')
            .classList.remove('hidden');

        document.getElementById('restartBtn')
            .classList.add('hidden');
    }

    togglePause(){

        this.paused = !this.paused;

        document.getElementById('pauseBtn').textContent =
            this.paused ? '▶' : '❚❚';
    }

    spawnWall(){

        const minGap = 110;

        const gapWidth =
            Math.max(
                minGap,
                170 - this.score * 1.2
            );

        const gapX =
            40 + Math.random() *
            (this.canvas.width - gapWidth - 80);

        this.walls.push({
            y:-60,
            height:32,
            gapX,
            gapWidth,
            scored:false
        });
    }

    update(){

        if(!this.running || this.paused) return;

        // speed scaling

        this.speed += 0.0008;

        // movement

        if(this.leftPressed){
            this.player.vx -= 0.8;
        }

        if(this.rightPressed){
            this.player.vx += 0.8;
        }

        this.player.vx *= 0.9;

        this.player.x += this.player.vx;

        // bounds

        if(this.player.x < 20){
            this.player.x = 20;
            this.player.vx = 0;
        }

        if(this.player.x > this.canvas.width - 20){
            this.player.x = this.canvas.width - 20;
            this.player.vx = 0;
        }

        // trail

        this.player.trail.push({
            x:this.player.x,
            y:this.player.y,
            life:1
        });

        if(this.player.trail.length > 18){
            this.player.trail.shift();
        }

        this.player.trail.forEach(t=>{
            t.life -= 0.05;
        });

        // spawn walls

        this.spawnTimer++;

        if(this.spawnTimer > 65){

            this.spawnTimer = 0;

            this.spawnWall();
        }

        // move walls

        this.walls.forEach(w=>{

            w.y += this.speed;

            // score

            if(!w.scored && w.y > this.player.y){

                w.scored = true;

                this.score++;

                this.screenShake = 4;

                this.createParticles(
                    this.player.x,
                    this.player.y,
                    10
                );

                document.getElementById('scoreValue')
                    .textContent = this.score;
            }

            // collision

            const playerHalf = this.player.size / 2;

            const insideWallY =
                this.player.y + playerHalf > w.y &&
                this.player.y - playerHalf < w.y + w.height;

            const insideLeft =
                this.player.x - playerHalf < w.gapX;

            const insideRight =
                this.player.x + playerHalf >
                w.gapX + w.gapWidth;

            if(
                insideWallY &&
                (insideLeft || insideRight)
            ){
                this.gameOver();
            }

        });

        // cleanup

        this.walls =
            this.walls.filter(w=>w.y < this.canvas.height + 80);

        this.updateParticles();
    }

    createParticles(x,y,count){

        for(let i = 0; i < count; i++){

            const a = Math.random() * Math.PI * 2;

            this.particles.push({
                x,
                y,
                vx:Math.cos(a)*(1+Math.random()*4),
                vy:Math.sin(a)*(1+Math.random()*4),
                life:1
            });
        }
    }

    updateParticles(){

        this.particles.forEach(p=>{

            p.x += p.vx;
            p.y += p.vy;

            p.vx *= 0.97;
            p.vy *= 0.97;

            p.life -= 0.03;
        });

        this.particles =
            this.particles.filter(p=>p.life > 0);
    }

    drawBackground(){

        const ctx = this.ctx;

        // grid

        ctx.strokeStyle = 'rgba(255,255,255,0.03)';

        for(let x = 0; x < this.canvas.width; x += 40){

            ctx.beginPath();

            ctx.moveTo(x,0);
            ctx.lineTo(x,this.canvas.height);

            ctx.stroke();
        }

        for(let y = 0; y < this.canvas.height; y += 40){

            ctx.beginPath();

            ctx.moveTo(0,y);
            ctx.lineTo(this.canvas.width,y);

            ctx.stroke();
        }
    }

    drawWalls(){

        const ctx = this.ctx;

        this.walls.forEach(w=>{

            // left wall

            ctx.fillStyle = '#F7374F';

            ctx.fillRect(
                0,
                w.y,
                w.gapX,
                w.height
            );

            // right wall

            ctx.fillRect(
                w.gapX + w.gapWidth,
                w.y,
                this.canvas.width,
                w.height
            );

            // glow line

            ctx.fillStyle = 'rgba(255,255,255,0.15)';

            ctx.fillRect(
                0,
                w.y,
                this.canvas.width,
                2
            );
        });
    }

    drawPlayer(){

        const ctx = this.ctx;

        // trail

        this.player.trail.forEach(t=>{

            ctx.globalAlpha = t.life * 0.25;

            ctx.fillStyle = '#ffffff';

            ctx.fillRect(
                t.x - 8,
                t.y - 8,
                16,
                16
            );
        });

        ctx.globalAlpha = 1;

        // glow

        ctx.shadowBlur = 25;
        ctx.shadowColor = '#ffffff';

        ctx.save();

        ctx.translate(
            this.player.x,
            this.player.y
        );

        ctx.rotate(this.player.vx * 0.03);

        ctx.fillStyle = '#ffffff';

        ctx.fillRect(
            -this.player.size/2,
            -this.player.size/2,
            this.player.size,
            this.player.size
        );

        ctx.restore();

        ctx.shadowBlur = 0;
    }

    drawParticles(){

        const ctx = this.ctx;

        this.particles.forEach(p=>{

            ctx.globalAlpha = p.life;

            ctx.fillStyle = '#ffffff';

            ctx.fillRect(p.x,p.y,2,2);
        });

        ctx.globalAlpha = 1;
    }

    draw(){

        const ctx = this.ctx;

        ctx.clearRect(
            0,
            0,
            this.canvas.width,
            this.canvas.height
        );

        ctx.save();

        // screenshake

        if(this.screenShake > 0){

            ctx.translate(
                (Math.random()-0.5)*this.screenShake,
                (Math.random()-0.5)*this.screenShake
            );

            this.screenShake *= 0.9;
        }

        this.drawBackground();

        this.drawWalls();

        this.drawPlayer();

        this.drawParticles();

        ctx.restore();
    }

    gameOver(){

        this.running = false;

        this.best =
            Math.max(this.best,this.score);

        document.getElementById('overlay').innerHTML = `
            <div class="panel">
                <h1>CORE LOST</h1>
                <p>
                    Score: <span class="highlight">${this.score}</span>
                </p>
                <p>
                    Best: <span class="highlight">${this.best}</span>
                </p>
                <p class="highlight">
                    Press restart
                </p>
            </div>
        `;

        this.showOverlay();

        document.getElementById('playBtn')
            .classList.remove('hidden');

        document.getElementById('pauseBtn')
            .classList.add('hidden');

        document.getElementById('restartBtn')
            .classList.remove('hidden');
    }

    showOverlay(){

        document.getElementById('overlay')
            .style.display = 'flex';
    }

    hideOverlay(){

        document.getElementById('overlay')
            .style.display = 'none';
    }

    loop(){

        const animate = ()=>{

            this.update();

            this.draw();

            requestAnimationFrame(animate);
        };

        animate();
    }
}

const canvas = document.getElementById('gameCanvas');

const game = new NeonDrift(canvas);

</script>

</body>
</html>
