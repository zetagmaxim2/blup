<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUBE RUNNER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            background: #0a0e27;
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            background: #0a0e27;
        }

        /* Top UI Bar */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            pointer-events: none;
        }

        /* Icon Buttons */
        .icon-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 136, 0.15);
            border: 2px solid #00ff88;
            border-radius: 8px;
            color: #00ff88;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
            pointer-events: auto;
            font-weight: bold;
        }

        .icon-btn:hover {
            background: rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            transform: scale(1.05);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .icon-btn.red {
            background: rgba(255, 0, 110, 0.15);
            border-color: #ff006e;
            color: #ff006e;
        }

        .icon-btn.red:hover {
            background: rgba(255, 0, 110, 0.3);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.4);
        }

        /* Score Display */
        .score-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            pointer-events: none;
        }

        .score-label {
            font-size: 11px;
            color: #64c8ff;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 36px;
            font-weight: 900;
            color: #00ff88;
            line-height: 1;
        }

        .high-score {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Game Status */
        .game-status {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: #ff006e;
            font-weight: bold;
            text-align: center;
            min-height: 20px;
            pointer-events: none;
            z-index: 50;
        }

        /* Mobile Controls */
        .mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            z-index: 50;
        }

        .mobile-controls.show {
            display: flex;
        }

        .mobile-control-row {
            display: flex;
            gap: 6px;
        }

        .mobile-btn {
            width: 50px;
            height: 50px;
            background: rgba(100, 200, 255, 0.2);
            border: 2px solid #64c8ff;
            color: #64c8ff;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }

        .mobile-btn:active {
            background: rgba(100, 200, 255, 0.5);
            transform: scale(0.9);
        }

        /* Pause overlay */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(4px);
        }

        .pause-overlay.show {
            display: flex;
        }

        .pause-text {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
        }

        /* Game Over screen */
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 30px;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .game-over-overlay.show {
            display: flex;
        }

        .game-over-title {
            font-size: 60px;
            font-weight: bold;
            color: #ff006e;
            text-shadow: 0 0 20px rgba(255, 0, 110, 0.5);
        }

        .game-over-score {
            text-align: center;
        }

        .game-over-score-label {
            font-size: 14px;
            color: #aaa;
            letter-spacing: 1px;
        }

        .game-over-score-value {
            font-size: 54px;
            font-weight: bold;
            color: #ff006e;
            margin-top: 10px;
        }

        .game-over-best {
            font-size: 13px;
            color: #aaa;
            margin-top: 15px;
        }

        .game-over-new-record {
            font-size: 18px;
            color: #ffb800;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 184, 0, 0.6);
        }

        @media (max-width: 768px) {
            .icon-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .score-value {
                font-size: 28px;
            }

            .score-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <!-- Top UI Bar -->
        <div class="top-bar">
            <button class="icon-btn" id="startBtn" title="Start Game">▶️</button>
            
            <div class="score-display">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="scoreText">0</div>
                <div class="high-score" id="bestText">Best: 0</div>
            </div>

            <button class="icon-btn" id="settingsBtn" title="Pause / Settings">⏸️</button>
        </div>

        <!-- Game Status -->
        <div class="game-status" id="status"></div>

        <!-- Pause Overlay -->
        <div class="pause-overlay" id="pauseOverlay">
            <div class="pause-text">PAUSED</div>
        </div>

        <!-- Game Over Overlay -->
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="game-over-title">GAME OVER</div>
            <div class="game-over-score">
                <div class="game-over-score-label">FINAL SCORE</div>
                <div class="game-over-score-value" id="finalScore">0</div>
                <div class="game-over-new-record hidden" id="newRecord">🏆 NEW RECORD!</div>
                <div class="game-over-best" id="bestScore">Best: 0</div>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div class="mobile-controls" id="mobileControls">
            <button class="mobile-btn" onclick="gameInstance.moveUp()">▲</button>
            <div class="mobile-control-row">
                <button class="mobile-btn" onclick="gameInstance.moveLeft()">◄</button>
                <button class="mobile-btn" onclick="gameInstance.moveRight()">►</button>
            </div>
            <button class="mobile-btn" onclick="gameInstance.moveDown()">▼</button>
        </div>
    </div>

    <script>
        class CubeGame {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.resizeCanvas();
                
                this.gameRunning = false;
                this.gamePaused = false;
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('cubeHighScore')) || 0;
                this.combo = 0;

                // Game objects
                this.currentPlatform = null;
                this.nextPlatform = null;
                this.platforms = [];
                this.cube = { x: 0, y: 0, size: 40, rotation: 0 };
                this.particles = [];
                this.platformBreakSpeed = 1;
                this.screenShake = 0;
                this.time = 0;

                // Boundary margins
                this.platformSize = 120;
                this.margin = 80;

                this.setupEventListeners();
                this.updateDisplay();
                this.startGameLoop();
                this.checkMobileControls();

                // Handle window resize
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            checkMobileControls() {
                if (window.innerWidth < 768) {
                    document.getElementById('mobileControls').classList.add('show');
                }
            }

            setupEventListeners() {
                document.getElementById('startBtn').addEventListener('click', () => {
                    if (!this.gameRunning) {
                        this.startGame();
                    }
                });

                document.getElementById('settingsBtn').addEventListener('click', () => {
                    if (this.gameRunning) {
                        this.togglePause();
                    }
                });

                window.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    const key = e.key.toLowerCase();
                    if (e.key === 'ArrowUp' || key === 'w') this.moveUp();
                    if (e.key === 'ArrowRight' || key === 'd') this.moveRight();
                    if (e.key === 'ArrowDown' || key === 's') this.moveDown();
                    if (e.key === 'ArrowLeft' || key === 'a') this.moveLeft();
                    if (e.key === 'Escape') this.togglePause();
                });

                let touchStartX = 0;
                let touchStartY = 0;
                
                this.canvas.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                }, false);

                this.canvas.addEventListener('touchend', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const dx = touchEndX - touchStartX;
                    const dy = touchStartY - touchEndY;
                    
                    const threshold = 50;
                    
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > threshold) this.moveRight();
                        else if (dx < -threshold) this.moveLeft();
                    } else {
                        if (dy > threshold) this.moveUp();
                        else if (dy < -threshold) this.moveDown();
                    }
                }, false);
            }

            startGame() {
                console.log('Game starting...');
                this.gameRunning = true;
                this.gamePaused = false;
                this.score = 0;
                this.combo = 0;
                this.platforms = [];
                this.particles = [];
                this.platformBreakSpeed = 1;
                this.screenShake = 0;
                this.time = 0;

                // Hide overlays
                document.getElementById('gameOverOverlay').classList.remove('show');
                document.getElementById('pauseOverlay').classList.remove('show');
                document.getElementById('settingsBtn').textContent = '⏸️';

                // Create starting platform
                this.currentPlatform = this.createPlatformObject(
                    this.canvas.width / 2, 
                    this.canvas.height - 150, 
                    true
                );
                this.platforms.push(this.currentPlatform);
                
                this.cube.x = this.canvas.width / 2;
                this.cube.y = this.canvas.height - 150;
                this.cube.rotation = 0;

                this.spawnNextPlatform();
                this.updateDisplay();
                console.log('Game started!');
            }

            togglePause() {
                if (!this.gameRunning) return;
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseOverlay').classList.toggle('show');
                document.getElementById('settingsBtn').textContent = this.gamePaused ? '▶️' : '⏸️';
            }

            createPlatformObject(x, y, isStart = false) {
                return {
                    x: x,
                    y: y,
                    width: 120,
                    height: 120,
                    breaking: false,
                    breakProgress: 0,
                    isStart: isStart
                };
            }

            spawnNextPlatform() {
                if (!this.currentPlatform) return;

                let validPosition = false;
                let attempts = 0;
                let newX, newY;

                while (!validPosition && attempts < 10) {
                    const directions = [
                        { x: 0, y: -250, name: 'UP' },
                        { x: 250, y: 0, name: 'RIGHT' },
                        { x: 0, y: 250, name: 'DOWN' },
                        { x: -250, y: 0, name: 'LEFT' }
                    ];

                    const dir = directions[Math.floor(Math.random() * directions.length)];
                    
                    newX = this.currentPlatform.x + dir.x;
                    newY = this.currentPlatform.y + dir.y;

                    const minX = this.margin + 60;
                    const maxX = this.canvas.width - this.margin - 60;
                    const minY = this.margin + 100;
                    const maxY = this.canvas.height - this.margin - 60;

                    if (newX >= minX && newX <= maxX && newY >= minY && newY <= maxY) {
                        validPosition = true;
                    }

                    attempts++;
                }

                if (!validPosition) {
                    const minX = this.margin + 60;
                    const maxX = this.canvas.width - this.margin - 60;
                    const minY = this.margin + 100;
                    const maxY = this.canvas.height - this.margin - 60;

                    newX = Math.max(minX, Math.min(maxX, this.currentPlatform.x + 250));
                    newY = Math.max(minY, Math.min(maxY, this.currentPlatform.y - 250));
                }

                this.nextPlatform = this.createPlatformObject(newX, newY, false);
                this.platforms.push(this.nextPlatform);
            }

            moveUp() { this.moveTo('UP'); }
            moveRight() { this.moveTo('RIGHT'); }
            moveDown() { this.moveTo('DOWN'); }
            moveLeft() { this.moveTo('LEFT'); }

            moveTo(direction) {
                if (!this.gameRunning || this.gamePaused) return;
                if (!this.nextPlatform) return;

                const dx = this.nextPlatform.x - this.cube.x;
                const dy = this.nextPlatform.y - this.cube.y;

                let isValid = false;
                if (direction === 'UP' && dy < -50) isValid = true;
                if (direction === 'RIGHT' && dx > 50) isValid = true;
                if (direction === 'DOWN' && dy > 50) isValid = true;
                if (direction === 'LEFT' && dx < -50) isValid = true;

                if (!isValid) return;

                if (this.currentPlatform) {
                    this.currentPlatform.breaking = true;
                }

                const startX = this.cube.x;
                const startY = this.cube.y;
                let progress = 0;
                const duration = 0.25;
                const targetX = this.nextPlatform.x;
                const targetY = this.nextPlatform.y;

                const animate = () => {
                    progress += 0.016 / duration;
                    
                    if (progress >= 1) {
                        this.cube.x = targetX;
                        this.cube.y = targetY;
                        
                        this.currentPlatform = this.nextPlatform;
                        this.nextPlatform = null;
                        
                        this.score++;
                        this.combo++;
                        
                        this.createParticles(this.cube.x, this.cube.y, 15);
                        
                        if (this.score > this.highScore) {
                            this.highScore = this.score;
                            localStorage.setItem('cubeHighScore', this.score);
                        }
                        
                        this.platformBreakSpeed = 1 + (this.score * 0.06);
                        this.spawnNextPlatform();
                        this.updateDisplay();
                        return;
                    }

                    const t = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                    this.cube.x = startX + (targetX - startX) * t;
                    this.cube.y = startY + (targetY - startY) * t;
                    this.cube.rotation += (Math.random() * 60 - 30) * 0.016;
                    
                    requestAnimationFrame(animate);
                };

                animate();
            }

            createParticles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * (6 + Math.random() * 6),
                        vy: Math.sin(angle) * (6 + Math.random() * 6) - 3,
                        life: 1,
                        size: 6 + Math.random() * 10,
                        color: '#00ff88'
                    });
                }
            }

            update() {
                if (!this.gameRunning || this.gamePaused) return;

                this.time += 0.016;

                this.platforms.forEach(platform => {
                    if (platform.breaking) {
                        platform.breakProgress += this.platformBreakSpeed * 0.016;
                    }
                });

                this.platforms = this.platforms.filter(p => p.breakProgress < 1);

                this.particles.forEach(p => {
                    p.life -= 0.016;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.4;
                });
                this.particles = this.particles.filter(p => p.life > 0);

                if (this.cube.y > this.canvas.height + 200) {
                    this.endGame();
                }

                if (this.screenShake > 0) {
                    this.screenShake *= 0.93;
                }
            }

            endGame() {
                this.gameRunning = false;
                this.screenShake = 25;
                this.createParticles(this.cube.x, this.cube.y, 35);
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('bestScore').textContent = `Best: ${this.highScore}`;
                
                if (this.score > this.highScore) {
                    document.getElementById('newRecord').classList.remove('hidden');
                } else {
                    document.getElementById('newRecord').classList.add('hidden');
                }
                
                document.getElementById('gameOverOverlay').classList.add('show');
                document.getElementById('settingsBtn').textContent = '⏸️';
            }

            updateDisplay() {
                document.getElementById('scoreText').textContent = this.score;
                document.getElementById('bestText').textContent = `Best: ${this.highScore}`;
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                let shakeX = 0, shakeY = 0;
                if (this.screenShake > 0) {
                    shakeX = (Math.random() - 0.5) * this.screenShake;
                    shakeY = (Math.random() - 0.5) * this.screenShake;
                }

                ctx.save();
                ctx.translate(shakeX, shakeY);

                const gradient = ctx.createLinearGradient(0, 0, 0, h);
                gradient.addColorStop(0, '#0a0e27');
                gradient.addColorStop(1, '#1a1f3a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, w, h);

                ctx.strokeStyle = 'rgba(100, 200, 255, 0.08)';
                ctx.lineWidth = 1;
                for (let x = 0; x < w; x += 100) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, h);
                    ctx.stroke();
                }
                for (let y = 0; y < h; y += 100) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(w, y);
                    ctx.stroke();
                }

                // Draw platforms
                this.platforms.forEach((platform) => {
                    ctx.globalAlpha = 1 - platform.breakProgress * 0.7;
                    
                    let color = '#64c8ff';
                    let glowColor = '#64c8ff';
                    let label = 'SAFE';

                    if (platform.isStart || platform === this.currentPlatform) {
                        color = '#00ff88';
                        glowColor = '#00ff88';
                        label = 'CURRENT';
                    } else if (platform === this.nextPlatform) {
                        color = '#ff006e';
                        glowColor = '#ff0066';
                        label = 'NEXT!';
                    }

                    if (platform === this.nextPlatform) {
                        ctx.shadowColor = glowColor;
                        ctx.shadowBlur = 50;
                        
                        const pulse = Math.sin(this.time * 4) * 0.3 + 0.7;
                        ctx.globalAlpha = (1 - platform.breakProgress * 0.7) * pulse * 0.5;
                        ctx.fillStyle = glowColor;
                        ctx.fillRect(
                            platform.x - 60 - 20,
                            platform.y - 60 - 20,
                            platform.width + 40,
                            platform.height + 40
                        );
                        ctx.globalAlpha = 1 - platform.breakProgress * 0.7;
                    }

                    ctx.fillStyle = color;
                    ctx.shadowColor = glowColor;
                    ctx.shadowBlur = 30;
                    
                    let shake = 0;
                    if (platform.breaking) {
                        shake = Math.sin(platform.breakProgress * Math.PI * 8) * 4;
                    }
                    
                    ctx.fillRect(
                        platform.x - 60 + shake,
                        platform.y - 60 + shake,
                        platform.width,
                        platform.height
                    );

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(
                        platform.x - 60 + shake,
                        platform.y - 60 + shake,
                        platform.width,
                        platform.height
                    );

                    ctx.globalAlpha = 1 - platform.breakProgress * 0.7;
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = color;
                    ctx.shadowBlur = 10;
                    ctx.fillText(label, platform.x + shake, platform.y + shake);
                });

                ctx.globalAlpha = 1;

                // Draw arrow
                if (this.nextPlatform && this.gameRunning && !this.gamePaused) {
                    ctx.save();
                    
                    const dx = this.nextPlatform.x - this.cube.x;
                    const dy = this.nextPlatform.y - this.cube.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance > 150) {
                        const angle = Math.atan2(dy, dx);
                        const arrowX = this.cube.x + Math.cos(angle) * 100;
                        const arrowY = this.cube.y + Math.sin(angle) * 100;
                        
                        ctx.translate(arrowX, arrowY);
                        ctx.rotate(angle);
                        
                        ctx.fillStyle = 'rgba(255, 0, 110, 0.8)';
                        ctx.beginPath();
                        ctx.moveTo(30, 0);
                        ctx.lineTo(-20, -20);
                        ctx.lineTo(-10, 0);
                        ctx.lineTo(-20, 20);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.shadowColor = '#ff006e';
                        ctx.shadowBlur = 20;
                    }
                    
                    ctx.restore();
                }

                // Draw cube
                ctx.save();
                ctx.translate(this.cube.x, this.cube.y);
                ctx.rotate(this.cube.rotation);

                const faceSize = 40;
                const faces = [
                    { color: '#ff006e', x: -faceSize, y: -faceSize },
                    { color: '#00ff88', x: faceSize, y: -faceSize },
                    { color: '#64c8ff', x: -faceSize, y: faceSize }
                ];

                faces.forEach(face => {
                    ctx.fillStyle = face.color;
                    ctx.shadowColor = face.color;
                    ctx.shadowBlur = 25;
                    ctx.fillRect(face.x, face.y, faceSize * 2, faceSize * 2);

                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.lineWidth = 4;
                    ctx.strokeRect(face.x, face.y, faceSize * 2, faceSize * 2);
                });

                ctx.restore();

                // Draw particles
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life * 0.7;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.globalAlpha = 1;
                ctx.restore();
            }

            startGameLoop() {
                const gameLoop = () => {
                    this.update();
                    this.draw();
                    requestAnimationFrame(gameLoop);
                };
                gameLoop();
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const gameInstance = new CubeGame(canvas);
        window.gameInstance = gameInstance;
    </script>
</body>
</html>
