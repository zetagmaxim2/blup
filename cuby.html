<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cube Runner Minimal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0a0a;
    color: #f5f5f5;
    font-family: Inter, Arial, sans-serif;
}

body {
    touch-action: none;
}

.game-container {
    width: 100vw;
    height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;

    position: relative;

    overflow: hidden;

    background: #0a0a0a;
}

.top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 20px;

    background: rgba(10,10,10,0.55);
    backdrop-filter: blur(12px);
}

.button-group-left {
    display: flex;
    gap: 10px;
}

.icon-btn {
    width: 44px;
    height: 44px;

    border: 1px solid rgba(247,55,79,0.15);
    background: rgba(247,55,79,0.04);
    color: #F7374F;

    border-radius: 12px;

    cursor: pointer;

    transition:
        transform 0.15s ease,
        background 0.15s ease,
        border-color 0.15s ease;

    font-size: 16px;
}

.icon-btn:hover {
    background: rgba(247,55,79,0.1);
    border-color: rgba(247,55,79,0.3);
}

.icon-btn:active {
    transform: scale(0.94);
}

.icon-btn.hidden {
    display: none;
}

.score-display {
    text-align: center;
}

.score-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(247,55,79,0.4);
}

.score-value {
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
}

.timer-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    z-index: 200;

    background: rgba(247,55,79,0.05);
}

.timer-fill {
    height: 100%;
    width: 100%;

    background: #F7374F;

    transform-origin: left;
}

.game-area {
    position: relative;

    width: min(100vw, 500px);
    height: min(100vh, 900px);

    border-radius: 28px;
    overflow: hidden;

    border: 1px solid rgba(247,55,79,0.08);

    background: #0f0f0f;
}

canvas {
    width: 100%;
    height: 100%;

    display: block;

    background: #0a0a0a;

    touch-action: none;
}

.game-status {
    position: absolute;
    top: 50%;
    left: 50%;

    transform: translate(-50%, -50%);

    width: min(320px, 90vw);

    background: rgba(20,20,20,0.96);

    border: 1px solid rgba(247,55,79,0.1);
    border-radius: 24px;

    padding: 32px;

    text-align: center;

    display: none;

    z-index: 500;
}

.game-status.show {
    display: block;
}

.game-status h2 {
    font-size: 28px;
    margin-bottom: 12px;
}

.game-status p {
    color: rgba(247,55,79,0.6);
    margin-top: 10px;
}

@media (max-width: 768px) {
    .score-value {
        font-size: 28px;
    }

    .top-bar {
        padding: 12px;
    }

    .icon-btn {
        width: 40px;
        height: 40px;
    }

    .game-area {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        border: none;
    }
}
</style>
</head>
<body>
<div class="game-container">

    <div class="timer-bar">
        <div class="timer-fill" id="timerFill"></div>
    </div>

    <div class="top-bar">
        <div class="button-group-left">
            <button class="icon-btn" id="playBtn" onclick="gameInstance.startGame()">▶</button>
            <button class="icon-btn hidden" id="pauseBtn" onclick="gameInstance.togglePause()">❚❚</button>
            <button class="icon-btn hidden" id="restartBtn" onclick="gameInstance.startGame()">↺</button>
        </div>

        <div class="score-display">
            <div class="score-label">Score</div>
            <div class="score-value" id="scoreValue">0</div>
        </div>
    </div>

    <div class="game-area">
        <canvas id="gameCanvas"></canvas>

        <div class="game-status" id="gameStatus">
            <h2 id="statusTitle">Game Over</h2>
            <p id="statusMessage">Score: 0</p>
            <p>Swipe or use WASD / Arrow Keys</p>
        </div>
    </div>
</div>

<script>
class CubeGame {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        this.resize();
        window.addEventListener('resize', () => this.resize());

        this.gameRunning = false;
        this.gamePaused = false;
        this.isJumping = false;

        this.score = 0;
        this.combo = 1;
        this.highScore = parseInt(localStorage.getItem('cubeHighScore')) || 0;

        this.gridCellSize = Math.min(window.innerWidth, window.innerHeight) * 0.26;

        this.currentPlatform = null;
        this.nextPlatforms = [];

        this.cube = { x: 0, y: 0, rotation: 0 };

        this.particles = [];
        this.screenShake = 0;

        this.time = 0;
        this.platformTimer = 0;
        this.platformDuration = 2.2;

        this.setupInputs();
        this.gameLoop();
    }

    resize() {
        const maxWidth = Math.min(window.innerWidth, 500);
        const maxHeight = Math.min(window.innerHeight, 900);

        this.canvas.width = maxWidth;
        this.canvas.height = maxHeight;

        this.gridCellSize = Math.min(maxWidth, maxHeight) * 0.26;
    }

    // ---------------- INPUT ----------------
    setupInputs() {
        window.addEventListener('keydown', (e) => {
            if (!this.gameRunning || this.gamePaused) return;

            const key = e.key.toLowerCase();

            if (key === 'w' || e.key === 'ArrowUp') this.tryJump('UP');
            if (key === 'd' || e.key === 'ArrowRight') this.tryJump('RIGHT');
            if (key === 's' || e.key === 'ArrowDown') this.tryJump('DOWN');
            if (key === 'a' || e.key === 'ArrowLeft') this.tryJump('LEFT');
        });

        let sx = 0, sy = 0;

        this.canvas.addEventListener('touchstart', (e) => {
            sx = e.touches[0].clientX;
            sy = e.touches[0].clientY;
        });

        this.canvas.addEventListener('touchend', (e) => {
            if (!this.gameRunning || this.gamePaused) return;

            const dx = e.changedTouches[0].clientX - sx;
            const dy = e.changedTouches[0].clientY - sy;

            if (Math.abs(dx) > Math.abs(dy)) {
                this.tryJump(dx > 0 ? 'RIGHT' : 'LEFT');
            } else {
                this.tryJump(dy > 0 ? 'DOWN' : 'UP');
            }
        });
    }

    // ---------------- GAME START ----------------
    startGame() {
        this.gameRunning = true;
        this.gamePaused = false;
        this.score = 0;
        this.combo = 1;
        this.time = 0;

        const cx = this.canvas.width / 2;
        const cy = this.canvas.height * 0.65;

        this.currentPlatform = this.createPlatform(cx, cy, 'stable');

        this.cube.x = cx;
        this.cube.y = cy;

        this.spawnChoices();

        this.updateUI();
        this.showUI(true);

        document.getElementById('playBtn').classList.add('hidden');
        document.getElementById('pauseBtn').classList.remove('hidden');
        document.getElementById('restartBtn').classList.add('hidden');
    }

    // ---------------- PLATFORM SYSTEM ----------------
    createPlatform(x, y, type = 'stable') {
        return {
            x, y,
            type,
            width: 60,
            height: 60,
            breaking: false,
            life: type === 'fragile' ? 0.6 : 1
        };
    }

    spawnChoices() {
        const dirs = [
            { x: 0, y: -1, dir: 'UP' },
            { x: 1, y: 0, dir: 'RIGHT' },
            { x: 0, y: 1, dir: 'DOWN' },
            { x: -1, y: 0, dir: 'LEFT' }
        ];

        const shuffled = dirs.sort(() => Math.random() - 0.5);

        const base = this.gridCellSize;

        this.nextPlatforms = [];

        // spawn 2–3 choices
        const count = this.score > 10 ? 3 : 2;

        for (let i = 0; i < count; i++) {
            const d = shuffled[i];

            const x = this.currentPlatform.x + d.x * base;
            const y = this.currentPlatform.y + d.y * base;

            let type = 'stable';

            // difficulty injection
            const r = Math.random();

            if (this.score > 5 && r < 0.2) type = 'fragile';
            if (this.score > 10 && r < 0.15) type = 'decoy';
            if (this.score > 15 && r < 0.1) type = 'bonus';

            this.nextPlatforms.push({
                x,
                y,
                dir: d.dir,
                type,
                pulse: Math.random() * 10
            });
        }

        this.platformTimer = 0;

        // exponential difficulty curve
        this.platformDuration = Math.max(0.6, 2.2 * Math.pow(0.965, this.score));
    }

    // ---------------- JUMP SYSTEM ----------------
    tryJump(direction) {
        if (this.isJumping || !this.gameRunning || this.gamePaused) return;

        const target = this.nextPlatforms.find(p => p.dir === direction);
        if (!target) {
            this.screenShake = 4;
            return;
        }

        this.isJumping = true;

        const startX = this.cube.x;
        const startY = this.cube.y;

        const endX = target.x;
        const endY = target.y;

        let t = 0;
        const duration = 140;

        const animate = (ts = 0) => {
            t += 16 / duration;
            if (t >= 1) t = 1;

            const ease = t < 0.5
                ? 2 * t * t
                : 1 - Math.pow(-2 * t + 2, 2) / 2;

            const arc = Math.sin(t * Math.PI) * 40;

            this.cube.x = startX + (endX - startX) * ease;
            this.cube.y = startY + (endY - startY) * ease - arc;

            this.cube.rotation += 0.2;

            if (t < 1) {
                requestAnimationFrame(animate);
                return;
            }

            this.resolveLanding(target);
            this.isJumping = false;
        };

        animate();
    }

    resolveLanding(target) {
        this.currentPlatform = this.createPlatform(target.x, target.y, target.type);

        // DECAY LOGIC
        if (target.type === 'decoy') {
            this.gameOver();
            return;
        }

        // SCORE SYSTEM
        this.combo += 0.15;

        let gain = 1;

        if (target.type === 'bonus') gain = 3;
        if (target.type === 'fragile') gain = 2;

        this.score += Math.floor(gain * this.combo);

        // effects
        this.createParticles(this.cube.x, this.cube.y, 12);

        this.screenShake = 6;

        this.spawnChoices();
        this.updateUI();
    }

    // ---------------- GAME LOOP ----------------
    update() {
        if (!this.gameRunning || this.gamePaused) return;

        this.platformTimer += 0.016;

        if (this.platformTimer > this.platformDuration) {
            this.gameOver();
        }

        this.time += 0.016;
    }

    gameOver() {
        this.gameRunning = false;
        this.combo = 1;

        this.highScore = Math.max(this.highScore, this.score);
        localStorage.setItem('cubeHighScore', this.highScore);

        this.showUI(false);
        this.updateUI();

        document.getElementById('playBtn').classList.remove('hidden');
        document.getElementById('pauseBtn').classList.add('hidden');
        document.getElementById('restartBtn').classList.remove('hidden');
    }

    // ---------------- PARTICLES ----------------
    createParticles(x, y, n) {
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;

            this.particles.push({
                x, y,
                vx: Math.cos(a) * (2 + Math.random() * 3),
                vy: Math.sin(a) * (2 + Math.random() * 3),
                life: 1
            });
        }
    }

    // Update particle positions
    updateParticles() {
        this.particles.forEach(p => {
            p.life -= 0.03;
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.98;
            p.vy *= 0.98;
        });

        this.particles = this.particles.filter(p => p.life > 0);
    }

    // ---------------- UI ----------------
    updateUI() {
        document.getElementById('scoreValue').textContent = this.score;

        const progress = Math.max(0, 1 - this.platformTimer / this.platformDuration);
        document.getElementById('timerFill').style.width = `${progress * 100}%`;
    }

    showUI(running) {
        document.getElementById('gameStatus').classList.toggle('show', !running);
    }

    togglePause() {
        this.gamePaused = !this.gamePaused;
        document.getElementById('pauseBtn').textContent = this.gamePaused ? '▶' : '❚❚';
    }

    // ---------------- DRAW ----------------
    draw() {
        const ctx = this.ctx;

        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // current
        if (this.currentPlatform) {
            ctx.fillStyle = '#1f1f1f';
            ctx.fillRect(this.currentPlatform.x - 30, this.currentPlatform.y - 30, 60, 60);
        }

        // choices
        this.nextPlatforms.forEach(p => {
            ctx.globalAlpha = 0.9;

            if (p.type === 'bonus') ctx.fillStyle = '#00ff99';
            else if (p.type === 'fragile') ctx.fillStyle = '#ffaa00';
            else if (p.type === 'decoy') ctx.fillStyle = '#ff0033';
            else ctx.fillStyle = '#F7374F';

            ctx.fillRect(p.x - 30, p.y - 30, 60, 60);
        });

        ctx.globalAlpha = 1;

        // cube
        ctx.save();
        ctx.translate(this.cube.x, this.cube.y);
        ctx.rotate(this.cube.rotation);

        ctx.fillStyle = '#fff';
        ctx.fillRect(-18, -18, 36, 36);

        ctx.restore();

        // particles
        this.particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = '#fff';
            ctx.fillRect(p.x, p.y, 2, 2);
        });

        ctx.globalAlpha = 1;
    }

    gameLoop() {
        const loop = () => {
            this.update();
            this.updateParticles();
            this.draw();
            requestAnimationFrame(loop);
        };
        loop();
    }
}

const canvas = document.getElementById('gameCanvas');
const gameInstance = new CubeGame(canvas);
window.gameInstance = gameInstance;
</script>
</body>
</html>
