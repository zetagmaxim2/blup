<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Drift</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0a0a0a;
    font-family:Arial,sans-serif;
}

body{
    touch-action:none;
}

.game-container{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0a0a0a;
}

.game-area{
    position:relative;
    width:min(100vw,500px);
    height:min(100vh,900px);
    overflow:hidden;
    background:#0f0f0f;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    background:#0a0a0a;
}

.top-ui{
    position:absolute;
    top:0;
    left:0;
    right:0;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:16px;

    z-index:10;
}

.score{
    color:white;
}

.score-label{
    font-size:11px;
    letter-spacing:2px;
    color:rgba(247,55,79,0.6);
}

.score-value{
    font-size:34px;
    font-weight:bold;
}

.play-btn{
    width:50px;
    height:50px;

    border:none;
    border-radius:14px;

    background:#F7374F;
    color:white;

    font-size:20px;
    cursor:pointer;
    transition:background 0.2s;
}

.play-btn:hover{
    background:#ff1744;
}

.play-btn:active{
    transform:scale(0.95);
}

.start-screen{

    position:absolute;
    inset:0;

    display:flex;
    align-items:center;
    justify-content:center;

    background:rgba(0,0,0,0.85);

    z-index:20;
    visibility:visible;
}

.panel{
    width:300px;
    padding:32px;

    background:#151515;

    border-radius:24px;

    text-align:center;

    border:1px solid rgba(247,55,79,0.2);
}

.panel h1{
    color:white;
    margin-bottom:12px;
    font-size:36px;
}

.panel p{
    color:rgba(255,255,255,0.65);
    line-height:1.5;
    margin-top:10px;
}

.highlight{
    color:#F7374F;
}

.mobile-controls{
    position:absolute;
    bottom:20px;
    left:0;
    right:0;

    display:flex;
    justify-content:center;
    gap:20px;

    z-index:15;
}

.control-btn{
    width:70px;
    height:70px;

    border:none;
    border-radius:50%;

    background:rgba(247,55,79,0.15);

    color:#F7374F;

    font-size:28px;

    backdrop-filter:blur(6px);
    cursor:pointer;
    transition:background 0.2s;
    user-select:none;
}

.control-btn:active{
    background:rgba(247,55,79,0.35);
}

</style>
</head>
<body>

<div class="game-container">

    <div class="game-area">

        <div class="top-ui">

            <button class="play-btn" id="playBtn">▶</button>

            <div class="score">
                <div class="score-label">SCORE</div>
                <div class="score-value" id="scoreValue">0</div>
            </div>

        </div>

        <canvas id="gameCanvas"></canvas>

       

        <div class="mobile-controls">

            <button class="control-btn" id="leftBtn">◀</button>

            <button class="control-btn" id="rightBtn">▶</button>

        </div>

    </div>

</div>

<script>

class NeonDrift {

    constructor(canvas){

        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');

        this.resize();

        window.addEventListener(
            'resize',
            ()=>this.resize()
        );

        this.running = false;

        this.score = 0;

        this.speed = 5;

        this.left = false;
        this.right = false;

        this.spawnTimer = 0;

        this.player = {
            x:0,
            y:0,
            size:24,
            vx:0
        };

        this.walls = [];

        this.setupControls();

        this.loop();
    }

    resize(){

        this.canvas.width =
            Math.min(window.innerWidth,500);

        this.canvas.height =
            Math.min(window.innerHeight,900);
    }

    setupControls(){

        // keyboard

        window.addEventListener('keydown',(e)=>{

            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A'){
                this.left = true;
            }

            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){
                this.right = true;
            }

        });

        window.addEventListener('keyup',(e)=>{

            if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A'){
                this.left = false;
            }

            if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D'){
                this.right = false;
            }

        });

        // touch/mouse controls for buttons

        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');

        // Touch events
        leftBtn.addEventListener('touchstart', (e)=>{
            e.preventDefault();
            this.left = true;
        });

        leftBtn.addEventListener('touchend', (e)=>{
            e.preventDefault();
            this.left = false;
        });

        rightBtn.addEventListener('touchstart', (e)=>{
            e.preventDefault();
            this.right = true;
        });

        rightBtn.addEventListener('touchend', (e)=>{
            e.preventDefault();
            this.right = false;
        });

        // Mouse events for desktop testing
        leftBtn.addEventListener('mousedown',()=>{
            this.left = true;
        });

        leftBtn.addEventListener('mouseup',()=>{
            this.left = false;
        });

        leftBtn.addEventListener('mouseleave',()=>{
            this.left = false;
        });

        rightBtn.addEventListener('mousedown',()=>{
            this.right = true;
        });

        rightBtn.addEventListener('mouseup',()=>{
            this.right = false;
        });

        rightBtn.addEventListener('mouseleave',()=>{
            this.right = false;
        });

        // play button - ensure it's attached correctly
        const playBtn = document.getElementById('playBtn');
        
        const handlePlayClick = () => {
            console.log('Play button clicked');
            this.start();
        };

        playBtn.addEventListener('click', handlePlayClick);
        playBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            handlePlayClick();
        });
    }

    start(){

        this.running = true;

        this.score = 0;

        this.speed = 5;

        this.walls = [];

        this.player.x =
            this.canvas.width / 2;

        this.player.y =
            this.canvas.height - 120;

        this.player.vx = 0;

        this.spawnTimer = 0;

        document
            .getElementById('scoreValue')
            .textContent = '0';

        // Reset the panel HTML
        document
            .querySelector('.panel')
            .innerHTML = `
                <h1>NEON DRIFT</h1>
                <p>Move the cube left and right.</p>
                <p>Pass through the gaps.</p>
                <p class="highlight">Survive as long as possible.</p>
            `;

        const startScreen = document
            .getElementById('startScreen');
        
        startScreen.style.display = 'none';
        startScreen.style.visibility = 'hidden';
    }

    spawnWall(){

        const gapWidth =
            Math.max(
                85,
                160 - this.score * 1.5
            );

        const gapX =
            Math.random() *
            (this.canvas.width - gapWidth);

        this.walls.push({

            y:-40,

            height:28,

            gapX,
            gapWidth,

            passed:false
        });
    }

    update(){

        if(!this.running) return;

        // movement

        if(this.left){
            this.player.vx -= 0.8;
        }

        if(this.right){
            this.player.vx += 0.8;
        }

        this.player.vx *= 0.9;

        this.player.x += this.player.vx;

        // bounds

        const halfSize = this.player.size / 2;

        if(this.player.x < halfSize){
            this.player.x = halfSize;
            this.player.vx = 0;
        }

        if(this.player.x > this.canvas.width - halfSize){
            this.player.x = this.canvas.width - halfSize;
            this.player.vx = 0;
        }

        // walls

        this.spawnTimer++;

        if(this.spawnTimer > 55){

            this.spawnTimer = 0;

            this.spawnWall();
        }

        this.walls.forEach(w=>{

            w.y += this.speed;

            // score

            if(
                !w.passed &&
                w.y > this.player.y
            ){

                w.passed = true;

                this.score++;

                this.speed += 0.12;

                document
                    .getElementById('scoreValue')
                    .textContent =
                        this.score;
            }

            // collision

            const half = this.player.size / 2;

            const hitY =
                this.player.y + half > w.y &&
                this.player.y - half < w.y + w.height;

            const hitLeft =
                this.player.x - half < w.gapX;

            const hitRight =
                this.player.x + half >
                w.gapX + w.gapWidth;

            if(hitY && (hitLeft || hitRight)){
                this.gameOver();
            }

        });

        // cleanup

        this.walls =
            this.walls.filter(
                w=>w.y < this.canvas.height + 50
            );
    }

    drawBackground(){

        const ctx = this.ctx;

        ctx.strokeStyle =
            'rgba(255,255,255,0.03)';

        ctx.lineWidth = 1;

        for(let x = 0;
            x < this.canvas.width;
            x += 40){

            ctx.beginPath();

            ctx.moveTo(x,0);

            ctx.lineTo(
                x,
                this.canvas.height
            );

            ctx.stroke();
        }

        for(let y = 0;
            y < this.canvas.height;
            y += 40){

            ctx.beginPath();

            ctx.moveTo(0,y);

            ctx.lineTo(
                this.canvas.width,
                y
            );

            ctx.stroke();
        }
    }

    drawWalls(){

        const ctx = this.ctx;

        this.walls.forEach(w=>{

            ctx.fillStyle = '#F7374F';

            // left wall
            ctx.fillRect(
                0,
                w.y,
                w.gapX,
                w.height
            );

            // right wall
            ctx.fillRect(
                w.gapX + w.gapWidth,
                w.y,
                this.canvas.width - (w.gapX + w.gapWidth),
                w.height
            );
        });
    }

    drawPlayer(){

        const ctx = this.ctx;

        ctx.save();

        ctx.translate(
            this.player.x,
            this.player.y
        );

        ctx.rotate(
            this.player.vx * 0.04
        );

        ctx.shadowBlur = 20;
        ctx.shadowColor = '#fff';

        ctx.fillStyle = '#fff';

        ctx.fillRect(
            -12,
            -12,
            24,
            24
        );

        ctx.restore();
    }

    draw(){

        const ctx = this.ctx;

        ctx.clearRect(
            0,
            0,
            this.canvas.width,
            this.canvas.height
        );

        this.drawBackground();

        this.drawWalls();

        this.drawPlayer();
    }

    gameOver(){

        this.running = false;

        const startScreen = document
            .getElementById('startScreen');

        startScreen.style.display = 'flex';
        startScreen.style.visibility = 'visible';

        document
            .querySelector('.panel')
            .innerHTML = `
                <h1>GAME OVER</h1>
                <p>
                    Score:
                    <span class="highlight">
                        ${this.score}
                    </span>
                </p>
                <p>
                    Press ▶ to restart
                </p>
            `;
    }

    loop(){

        const animate = ()=>{

            this.update();

            this.draw();

            requestAnimationFrame(animate);
        };

        animate();
    }
}

const canvas =
    document.getElementById('gameCanvas');

const game =
    new NeonDrift(canvas);

</script>

</body>
</html>
